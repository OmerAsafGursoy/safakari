let pageEditor = null;
let currentEditorPageId = null;
let autoSaveTimer = null;

// ── Admin: Open page editor (custom pages only) ──
function openPageEditor(id){
  const pg = D.pages.find(p=>p.id===id);
  if(!pg || pg.type!=='custom'){ toast('Bu sayfa duzenlenemiyor'); return; }
  migratePageToBlocks(pg); // ensure editorData exists
  currentEditorPageId = id;
  const bd = document.getElementById('admBd');
  const pubTxt = pg.visible ? '✅ Yayında' : '💾 Taslak';
  const pubStatus = pg.visible ? 'live' : 'draft';

  bd.innerHTML = `
    <div class="pe-topbar">
      <button class="abtn sc" onclick="closePageEditor()" aria-label="Sayfa listesine don">← Geri</button>
      <input class="pe-title-in" id="pe_title" value="${escapeHtml(pg.title)}" placeholder="Sayfa basligi" aria-label="Sayfa basligi">
      <span class="pe-badge" id="pe_badge" data-status="${pubStatus}" aria-live="polite">${pubTxt}</span>
      <span class="pe-save-ind" id="pe_save_ind" aria-live="polite">Hazır</span>
    </div>
    <div class="pe-actions">
      ${pg.visible
        ? `<button class="abtn sc" onclick="unpublishPage()" aria-label="Sayfayi taslaga cevir">💾 Taslağa Çevir</button>`
        : `<button class="abtn sv" onclick="publishPage()" aria-label="Sayfayi yayinla">✅ Yayınla</button>`}
      <span style="font-size:.72rem;color:var(--txm);margin-left:8px">💡 Yazmaya basla, "/" ile blok ekle. Degisiklikler otomatik kaydedilir.</span>
    </div>
    <div id="page_editor" aria-label="Sayfa icerik editoru"></div>
    <div class="pe-danger-zone">
      <button class="abtn dn" onclick="deletePage('${escapeHtml(id)}')" aria-label="Sayfayi sil">🗑️ Sayfayi Sil</button>
    </div>
  `;

  // Wire title input to auto-save
  document.getElementById('pe_title').addEventListener('input', ()=>{
    const v = document.getElementById('pe_title').value;
    const cur = D.pages.find(p=>p.id===currentEditorPageId);
    if(cur){ cur.title = v; debouncedAutoSave(); }
  });

  // Destroy previous editor if any
  destroyPageEditor();
  // Init Editor.js
  try {
    pageEditor = initPageEditor('page_editor', pg.editorData);
  } catch(err){
    console.error('Editor.js init fail:', err);
    document.getElementById('page_editor').innerHTML =
      `<p style="color:#c0392b;padding:20px">Editor yuklenemedi. Sayfayi yenileyip tekrar deneyin.<br><small>Detay: ${escapeHtml(err.message||err)}</small></p>`;
  }
  bd.scrollTop = 0;
}

function closePageEditor(){
  destroyPageEditor();
  currentEditorPageId = null;
  admTab('pages', document.querySelectorAll('.adm-ni')[4]);
}

function destroyPageEditor(){
  if(pageEditor && typeof pageEditor.destroy==='function'){
    try { pageEditor.destroy(); } catch(_){}
  }
  pageEditor = null;
  if(autoSaveTimer){ clearTimeout(autoSaveTimer); autoSaveTimer = null; }
}

// ── Editor.js init ──
function initPageEditor(holder, data){
  if(typeof EditorJS==='undefined'){
    throw new Error('Editor.js yuklenemedi (CDN erisimi yok olabilir)');
  }
  const safeData = data && Array.isArray(data.blocks) && data.blocks.length
    ? data
    : {blocks:[{type:'paragraph', data:{text:''}}]};
  // EditorJS plugins expose global classes. Name pattern varies per version.
  const HeaderCls = window.Header || window.EditorjsHeader;
  const ParagraphCls = window.Paragraph || window.EditorjsParagraph;
  const ListCls = window.List || window.EditorjsList || window.NestedList;
  const ImageCls = window.ImageTool || window.Image || window.EditorjsImage;
  const DelimiterCls = window.Delimiter || window.EditorjsDelimiter;

  const tools = {};
  if(HeaderCls) tools.header = {class: HeaderCls, config:{levels:[1,2,3], defaultLevel:2, placeholder:'Başlık'}};
  if(ParagraphCls) tools.paragraph = {class: ParagraphCls, inlineToolbar:true, config:{placeholder:'Metin yaz...'}};
  if(ListCls) tools.list = {class: ListCls, inlineToolbar:true};
  if(ImageCls) tools.image = {class: ImageCls, config:{uploader:{uploadByFile: safakariImageUploader, uploadByUrl: safakariImageByUrl}}};
  if(DelimiterCls) tools.delimiter = DelimiterCls;
  tools.button = SafakariButtonTool;
  tools.gallery = SafakariGalleryTool;

  return new EditorJS({
    holder,
    placeholder: 'Yazmaya başla... "/" ile blok ekle',
    minHeight: 200,
    data: safeData,
    tools,
    onChange: ()=> debouncedAutoSave(),
    i18n: {
      messages: {
        toolNames: {Text:'Metin', Heading:'Başlık', List:'Liste', Image:'Görsel', Delimiter:'Ayraç', Button:'Buton', Gallery:'Galeri'},
        blockTunes: {
          delete: {Delete:'Sil', 'Click to delete':'Silmek icin tikla'},
          moveUp: {'Move up':'Yukari tasi'},
          moveDown: {'Move down':'Asagi tasi'}
        }
      }
    }
  });
}

// ── Custom "Button" Tool for Editor.js ──
// Editor.js Block Tool API uyumlu, ~60 satir vanilla JS
const SafakariButtonTool = class {
  static get toolbox(){ return {title:'Buton', icon:'<svg width="17" height="15" viewBox="0 0 17 15" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3" width="15" height="9" rx="2" stroke-width="1.5" stroke="currentColor" fill="none"/><path d="M5 7.5h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'}; }
  static get isReadOnlySupported(){ return true; }
  constructor({data, api, readOnly}){
    this.api = api;
    this.readOnly = !!readOnly;
    this.data = {
      label: (data && typeof data.label==='string') ? data.label : 'İletişime Geç',
      url:   (data && typeof data.url==='string')   ? data.url   : '#contact'
    };
    this.wrapper = null;
  }
  render(){
    const w = document.createElement('div');
    w.className = 'pb-btn-tool';
    w.innerHTML = `
      <label>Buton Metni</label>
      <input type="text" class="pb-btn-label" placeholder="Butonun uzerinde yazacak metin" value="${escapeHtml(this.data.label)}" ${this.readOnly?'readonly':''}>
      <label>Baglanti (URL)</label>
      <input type="text" class="pb-btn-url" placeholder="#contact veya https://... veya tel:+90..." value="${escapeHtml(this.data.url)}" ${this.readOnly?'readonly':''}>
      <div class="pb-btn-tool-preview">Onizleme: <b class="pb-btn-preview-lbl">${escapeHtml(this.data.label)}</b> → <span class="pb-btn-preview-url">${escapeHtml(this.data.url)}</span></div>
    `;
    const labelEl = w.querySelector('.pb-btn-label');
    const urlEl = w.querySelector('.pb-btn-url');
    const prevLbl = w.querySelector('.pb-btn-preview-lbl');
    const prevUrl = w.querySelector('.pb-btn-preview-url');
    const updatePrev = ()=>{
      prevLbl.textContent = labelEl.value || '(boş)';
      prevUrl.textContent = urlEl.value || '#';
      // trigger editor onChange
      try { this.api.blocks && this.api.blocks.getCurrentBlockIndex; } catch(_){}
    };
    labelEl.addEventListener('input', updatePrev);
    urlEl.addEventListener('input', updatePrev);
    this.wrapper = w;
    return w;
  }
  save(){
    const labelEl = this.wrapper?.querySelector('.pb-btn-label');
    const urlEl = this.wrapper?.querySelector('.pb-btn-url');
    return {
      label: (labelEl?.value || '').trim().slice(0, 120),
      url:   (urlEl?.value   || '').trim().slice(0, 500)
    };
  }
  static get sanitize(){ return {label:{}, url:{}}; }
};

// ── Custom "Gallery" Tool for Editor.js (2/3/4 col grid, max 4 fotograf) ──
const SafakariGalleryTool = class {
  static get toolbox(){
    return {
      title:'Galeri',
      icon:'<svg width="17" height="15" viewBox="0 0 17 15" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="1" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="1" y="8" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="8" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>'
    };
  }
  static get isReadOnlySupported(){ return true; }
  constructor({data, api, readOnly}){
    this.api = api;
    this.readOnly = !!readOnly;
    const layout = data && ['2','3','4'].includes(String(data.layout)) ? String(data.layout) : '3';
    const images = (data && Array.isArray(data.images) ? data.images : []).slice(0,4).map(i => ({
      url: (i && typeof i.url==='string') ? i.url : '',
      caption: (i && typeof i.caption==='string') ? i.caption : ''
    }));
    if(images.length === 0){ images.push({url:'', caption:''}, {url:'', caption:''}); }
    this.data = { layout, images };
    this.wrapper = null;
  }
  _triggerChange(){
    try {
      // Editor.js 2.x: dispatchChange bildirimi (debouncedAutoSave onChange kanaliyla)
      const idx = this.api && this.api.blocks && this.api.blocks.getCurrentBlockIndex
        ? this.api.blocks.getCurrentBlockIndex() : -1;
      if(this.api && this.api.blocks && typeof this.api.blocks.getBlockByIndex === 'function' && idx >= 0){
        const blk = this.api.blocks.getBlockByIndex(idx);
        if(blk && typeof blk.dispatchChange === 'function'){ blk.dispatchChange(); }
      }
    } catch(_){}
  }
  _renderSlot(i){
    const img = this.data.images[i] || {url:'', caption:''};
    const preview = img.url
      ? `<div class="pb-gal-preview" style="background-image:url('${String(img.url).replace(/'/g,"\\'")}')" data-i="${i}" role="button" tabindex="0" aria-label="Fotografi degistir">Degistir</div>`
      : `<div class="pb-gal-preview empty" data-i="${i}" role="button" tabindex="0" aria-label="Fotograf ekle">+ Foto Ekle</div>`;
    const rm = img.url ? `<button class="pb-gal-rm" data-i="${i}" aria-label="Fotografi sil" type="button">×</button>` : '';
    return `<div class="pb-gal-slot" data-slot="${i}">
      ${rm}
      ${preview}
      <input class="pb-gal-cap" data-i="${i}" type="text" placeholder="Altyazi (opsiyonel)" value="${escapeHtml(img.caption||'')}" ${this.readOnly?'readonly':''} maxlength="160">
    </div>`;
  }
  _renderGrid(){
    const grid = this.wrapper.querySelector('.pb-gal-grid');
    const n = this.data.images.length;
    let slots = '';
    for(let i=0; i<n; i++) slots += this._renderSlot(i);
    grid.setAttribute('data-layout', this.data.layout);
    grid.innerHTML = slots;
    this._wireGrid();
    this._updateFoot();
  }
  _updateFoot(){
    const addBtn = this.wrapper.querySelector('.pb-gal-add');
    if(addBtn){ addBtn.disabled = this.data.images.length >= 4; }
    const countEl = this.wrapper.querySelector('.pb-gal-count');
    if(countEl){ countEl.textContent = `${this.data.images.length} / 4 fotograf`; }
  }
  _wireGrid(){
    this.wrapper.querySelectorAll('.pb-gal-preview').forEach(el=>{
      const i = parseInt(el.getAttribute('data-i'),10);
      const trigger = ()=> this._pickFileFor(i);
      el.addEventListener('click', trigger);
      el.addEventListener('keydown', (e)=>{
        if(e.key==='Enter' || e.key===' '){ e.preventDefault(); trigger(); }
      });
    });
    this.wrapper.querySelectorAll('.pb-gal-rm').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const i = parseInt(btn.getAttribute('data-i'),10);
        if(!isNaN(i) && this.data.images[i]){
          this.data.images[i].url = '';
          this._renderGrid();
          this._triggerChange();
        }
      });
    });
    this.wrapper.querySelectorAll('.pb-gal-cap').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        const i = parseInt(inp.getAttribute('data-i'),10);
        if(!isNaN(i) && this.data.images[i]){
          this.data.images[i].caption = inp.value;
          this._triggerChange();
        }
      });
    });
  }
  async _pickFileFor(i){
    if(this.readOnly) return;
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.style.display = 'none';
    document.body.appendChild(inp);
    inp.addEventListener('change', async ()=>{
      const file = inp.files && inp.files[0];
      document.body.removeChild(inp);
      if(!file) return;
      try {
        const res = await safakariImageUploader(file);
        if(res && res.success && res.file && res.file.url){
          if(!this.data.images[i]) this.data.images[i] = {url:'', caption:''};
          this.data.images[i].url = res.file.url;
          this._renderGrid();
          this._triggerChange();
        }
      } catch(e){ console.warn('gallery upload fail', e); }
    });
    inp.click();
  }
  render(){
    const w = document.createElement('div');
    w.className = 'pb-gal-tool';
    w.innerHTML = `
      <div class="pb-gal-tool-head">
        <span>Duzen:</span>
        <label><input type="radio" name="gl-${Math.random().toString(36).slice(2,7)}" value="2" ${this.data.layout==='2'?'checked':''}> 2 sutun</label>
        <label><input type="radio" name="gl-" value="3" ${this.data.layout==='3'?'checked':''}> 3 sutun</label>
        <label><input type="radio" name="gl-" value="4" ${this.data.layout==='4'?'checked':''}> 4 sutun</label>
        <span class="pb-gal-count" style="margin-left:auto">${this.data.images.length} / 4 fotograf</span>
      </div>
      <div class="pb-gal-grid" data-layout="${this.data.layout}"></div>
      <div class="pb-gal-tool-foot">
        <button type="button" class="pb-gal-add" aria-label="Fotograf slotu ekle">+ Foto Slotu</button>
      </div>
    `;
    // Layout radio group: unique name
    const groupName = 'gl-'+Math.random().toString(36).slice(2,9);
    w.querySelectorAll('.pb-gal-tool-head input[type=radio]').forEach(r=>{
      r.name = groupName;
      r.addEventListener('change', ()=>{
        if(r.checked){
          this.data.layout = r.value;
          const grid = w.querySelector('.pb-gal-grid');
          if(grid) grid.setAttribute('data-layout', this.data.layout);
          this._triggerChange();
        }
      });
    });
    // Add-slot button
    w.querySelector('.pb-gal-add').addEventListener('click', ()=>{
      if(this.data.images.length >= 4) return;
      this.data.images.push({url:'', caption:''});
      this._renderGrid();
      this._triggerChange();
    });
    this.wrapper = w;
    // Render initial grid (senkron - this.wrapper atandi)
    this._renderGrid();
    return w;
  }
  save(){
    // Caption'lari son DOM state'inden topla (input listener zaten guncelliyor ama yine de merge)
    if(this.wrapper){
      this.wrapper.querySelectorAll('.pb-gal-cap').forEach(inp=>{
        const i = parseInt(inp.getAttribute('data-i'),10);
        if(!isNaN(i) && this.data.images[i]){
          this.data.images[i].caption = (inp.value || '').slice(0,160);
        }
      });
    }
    // Bos slotlari koruyabiliriz; render tarafi filter yapacak
    const cleaned = this.data.images.slice(0,4).map(i => ({
      url: (typeof i.url==='string') ? i.url : '',
      caption: (typeof i.caption==='string') ? i.caption.slice(0,160) : ''
    }));
    return {
      layout: ['2','3','4'].includes(this.data.layout) ? this.data.layout : '3',
      images: cleaned
    };
  }
  static get sanitize(){ return {layout:{}, images:{}}; }
};

// ── Editor.js image uploader (base64 via resizePhotoToDataURL) ──
async function safakariImageUploader(file){
  try {
    if(!file || !/^image\//.test(file.type)){
      toast('Sadece gorsel dosya yuklenebilir');
      return {success:0};
    }
    const dataUrl = await resizePhotoToDataURL(file, 800, 0.8);
    return {success:1, file:{url: dataUrl}};
  } catch(e){
    toast('Fotograf yuklenemedi');
    console.warn('image upload failed', e);
    return {success:0};
  }
}
async function safakariImageByUrl(url){
  // Musteri URL yapistirirsa: sadece https ya da data URL'i kabul et
  if(!/^(https?:\/\/|data:image\/)/i.test(url||'')){
    toast('Gecersiz URL');
    return {success:0};
  }
  return {success:1, file:{url: url}};
}

// ── Auto-save (debounced 3s) ──
function debouncedAutoSave(){
  if(autoSaveTimer) clearTimeout(autoSaveTimer);
  const ind = document.getElementById('pe_save_ind');
  if(ind){ ind.textContent = 'Yazılıyor...'; ind.className='pe-save-ind saving'; }
  autoSaveTimer = setTimeout(()=>{ autoSavePage(); }, 3000);
}

async function autoSavePage(){
  if(!pageEditor || !currentEditorPageId) return;
  try {
    const out = await pageEditor.save();
    const clean = sanitizeBlocks(out);
    const pg = D.pages.find(p=>p.id===currentEditorPageId);
    if(!pg) return;
    pg.editorData = clean;
    const titleEl = document.getElementById('pe_title');
    if(titleEl) pg.title = titleEl.value.trim() || pg.title;
    persistPages();
    // Re-render public page if currently visible
    const existing = document.getElementById('pg-'+pg.id);
    if(existing){ existing.remove(); /* will re-render on next showPage */ }
    const ind = document.getElementById('pe_save_ind');
    if(ind){ ind.textContent = '✓ Kaydedildi'; ind.className='pe-save-ind saved'; }
    buildNav();
  } catch(err){
    console.warn('autosave fail', err);
    const ind = document.getElementById('pe_save_ind');
    if(ind){ ind.textContent = '⚠️ Kaydedilemedi'; ind.className='pe-save-ind'; }
  }
}

// ── Publish / Unpublish ──
async function publishPage(){
  await autoSavePage();
  const pg = D.pages.find(p=>p.id===currentEditorPageId);
  if(!pg) return;
  pg.visible = true;
  persistPages();
  buildNav();
  // Re-render editor header (badge + action button)
  openPageEditor(pg.id);
  toast('Sayfa yayinlandi, navigasyonda gorunuyor');
}
async function unpublishPage(){
  await autoSavePage();
  const pg = D.pages.find(p=>p.id===currentEditorPageId);
  if(!pg) return;
  pg.visible = false;
  persistPages();

  openPageEditor(pg.id);
  toast('Sayfa taslaga cevrildi');
}

// ── Backup: export / import ──
function exportPagesJSON(){
  try {
    const dump = {
      exportedAt: new Date().toISOString(),
      schema: 'safakari_pages_v1',
      pages: D.pages
    };
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const dStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    a.href = url;
    a.download = `safakari-sayfalar-${dStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast('Yedek indirildi');
  } catch(e){
    console.warn('export fail', e);
    toast('Yedek olusturulamadi');
  }
}
function importPagesJSON(ev){
  const file = ev?.target?.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onerror = ()=> toast('Dosya okunamadi');
  reader.onload = ()=>{
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = Array.isArray(parsed) ? parsed : (parsed && Array.isArray(parsed.pages) ? parsed.pages : null);
      if(!incoming){ toast('Gecersiz JSON formati'); return; }
      // Validation: every item needs id + title
      const valid = incoming.every(p => p && typeof p.id==='string' && typeof p.title==='string');
      if(!valid){ toast('JSON sema uyumsuz (id + title zorunlu)'); return; }
      if(!confirm(`${incoming.length} sayfa yuklenecek. Mevcut tum sayfalar silinecek. Devam?`)) return;
      D.pages = incoming;
      persistPages();
      buildNav();
      admTab('pages', document.querySelectorAll('.adm-ni')[4]);
      toast(`${incoming.length} sayfa yuklendi`);
    } catch(e){
      console.warn('import fail', e);
      toast('JSON parse hatasi');
    } finally {
      ev.target.value = ''; // allow re-upload same file
    }
  };
  reader.readAsText(file);
}

// ═══ PHONE FORMAT ═══
function fmtPhone(input){
  input.addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'');
    // Remove leading zeros and country code
    while(v.startsWith('0')&&v.length>1)v=v.slice(1);
    if(v.startsWith('90')&&v.length>10)v=v.slice(2);
    if(v==='0'){this.value='0';return}
    // Cap at 10 digits (without leading 0)
    v=v.slice(0,10);
    let f='';
    if(v.length>0)f='0('+v.slice(0,3);
    if(v.length>=3)f+=') ';
    if(v.length>3)f+=v.slice(3,6);
    if(v.length>=6)f+=' ';
    if(v.length>6)f+=v.slice(6,8);
    if(v.length>=8)f+=' ';
    if(v.length>8)f+=v.slice(8,10);
    this.value=f;
  });
  input.setAttribute('maxlength','16');
  input.setAttribute('inputmode','tel');
}
// Auto-attach to phone inputs
function attachPhoneFmt(){
  document.querySelectorAll('[data-phone]').forEach(el=>{
    if(!el._phoneFmt){el._phoneFmt=true;fmtPhone(el)}
  });
}

new MutationObserver(()=>{setTimeout(attachPhoneFmt,50);setTimeout(attachValidationClear,50)}).observe(document.body,{childList:true,subtree:true});

// ═══ KREDI HESAPLAMA (Konut Kredisi) ═══
function calcLoan(){
  const priceEl = document.getElementById('ln_price');
  const downEl  = document.getElementById('ln_down');
  const termEl  = document.getElementById('ln_term');
  const rateEl  = document.getElementById('ln_rate');
  if(!priceEl||!downEl||!termEl||!rateEl) return;
  const price = parseFloat(priceEl.value) || 0;
  const down  = parseFloat(downEl.value)  || 0;
  const term  = parseInt(termEl.value,10) || 0;
  const rate  = parseFloat(rateEl.value)  || 0;
  // Clear previous invalid states
  [priceEl,downEl,termEl,rateEl].forEach(el=>el.classList.remove('invalid'));
  const out = document.getElementById('ln_output');
  if(!out) return;
  // Validations
  if(price<=0){ priceEl.classList.add('invalid'); out.innerHTML = `<p style="color:#c0392b;font-size:.85rem">${t('loan.err_price','Lütfen geçerli bir konut bedeli girin.')}</p>`; return; }
  if(down<0||down>=price){ downEl.classList.add('invalid'); out.innerHTML = `<p style="color:#c0392b;font-size:.85rem">${t('loan.err_down','Peşinat, konut bedelinden az olmalıdır.')}</p>`; return; }
  if(term<=0){ termEl.classList.add('invalid'); out.innerHTML = `<p style="color:#c0392b;font-size:.85rem">${t('loan.err_term','Vade en az 1 ay olmalıdır.')}</p>`; return; }
  if(rate<0){ rateEl.classList.add('invalid'); out.innerHTML = `<p style="color:#c0392b;font-size:.85rem">${t('loan.err_rate','Faiz oranı negatif olamaz.')}</p>`; return; }
  const K = price - down;        // kalan anapara
  const n = term;
  // Aylık/Yıllık toggle: radio degerine gore yorumla
  const unit = (document.querySelector('input[name="ln_rate_unit"]:checked')?.value) || 'monthly';
  const i = unit === 'monthly' ? rate/100 : rate/12/100;
  // Canli donusum notu
  const conv = document.getElementById('ln_rate_conv');
  if(conv){
    if(rate>0){
      if(unit==='monthly'){
        const yearly = (rate*12);
        conv.textContent = `${t('loan.rate_conv_yearly_prefix','≈ Yıllık %')}${yearly.toFixed(2)}${t('loan.rate_conv_yearly_suffix',"'e denk gelir")}`;
      } else {
        const monthly = (rate/12);
        conv.textContent = `${t('loan.rate_conv_monthly_prefix','≈ Aylık %')}${monthly.toFixed(2)}${t('loan.rate_conv_monthly_suffix',"'e denk gelir")}`;
      }
    } else {
      conv.textContent = '';
    }
  }
  let monthly, total, interest;
  if(i === 0){
    monthly = K / n;
  } else {
    const pow = Math.pow(1+i, n);
    monthly = K * (i * pow) / (pow - 1);
  }
  total = monthly * n;
  interest = total - K;
  // i18n: locale-aware currency formatting
  const fmt = v => (window.I18N && window.I18N.formatCurrency)
    ? window.I18N.formatCurrency(v)
    : new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:0}).format(v);
  out.innerHTML = `
    <h3>${t('loan.result_title','📊 Hesaplama Sonucu')}</h3>
    <div class="loan-row"><span class="lr-lbl">${t('loan.row_principal','Çekilecek Kredi')}</span><span class="lr-val">${fmt(K)}</span></div>
    <div class="loan-row total"><span class="lr-lbl">${t('loan.row_monthly','Aylık Taksit')}</span><span class="lr-val">${fmt(monthly)}</span></div>
    <div class="loan-row"><span class="lr-lbl">${t('loan.row_total','Toplam Geri Ödeme')}</span><span class="lr-val">${fmt(total)}</span></div>
    <div class="loan-row interest"><span class="lr-lbl">${t('loan.row_interest','Toplam Faiz')}</span><span class="lr-val">${fmt(interest)}</span></div>
    <p class="loan-disclaimer">${t('loan.disclaimer','Bu hesaplama bilgilendirme amaçlıdır. Güncel faiz oranları ve resmi teklif için banka ile iletişime geçmeniz önerilir.')}</p>
  `;
}
function attachLoanCalc(){
  ['ln_price','ln_down','ln_term','ln_rate'].forEach(id=>{
    const el = document.getElementById(id);
    if(el && !el._loanWired){ el._loanWired = true; el.addEventListener('input', calcLoan); }
  });
  // Rate unit radio toggle
  document.querySelectorAll('input[name="ln_rate_unit"]').forEach(el=>{
    if(!el._loanWired){
      el._loanWired = true;
      el.addEventListener('change', ()=>{
        const hint = document.getElementById('ln_rate_hint');
        if(hint){
          hint.textContent = el.value === 'monthly'
            ? t('loan.rate_hint_monthly',"Türkiye'de aylık konut kredisi faizi genelde %3-4 aralığındadır")
            : t('loan.rate_hint_yearly',"Bankanızın yıllık faiz oranı");
        }
        calcLoan();
      });
    }
  });
  calcLoan();
}

// ═══ ADMIN PASSWORD (SHA-256) ═══
// Omer: sifre hash'i icin tarayici konsoluna sunu yapistir:
//   (async()=>{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('SIFRENIZ'));console.log(Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join(''))})();
// veya bash: echo -n "SIFRENIZ" | sha256sum
// Default sifre: "safakari2026" - Omer sonra degistirmeli (yukaridaki snippet ile)
const ADMIN_PWD_HASH = "9bcdc7f012e9a1d9388929fc84026549edbc1f653626f9c71352518a54005589";
async function sha256Hex(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyAdminPassword(){
  // Valid session?
  try {
    const sess = sessionStorage.getItem('safakari_admin');
    if(sess){
      const parsed = JSON.parse(sess);
      if(parsed && parsed.ok && parsed.until && Date.now() < parsed.until) return true;
    }
  } catch(e){}
  const pwd = prompt(t('admin.pwd_prompt','Admin şifresi:'));
  if(pwd === null) return false;
  if(!pwd){ toast(t('admin.pwd_empty','Şifre boş olamaz')); return false; }
  const hash = await sha256Hex(pwd);
  if(hash === ADMIN_PWD_HASH){
    try {
      sessionStorage.setItem('safakari_admin', JSON.stringify({ ok:true, until: Date.now() + 24*60*60*1000 }));
    } catch(e){}
    return true;
  }
  toast(t('admin.pwd_wrong','Şifre hatalı'));
  return false;
}

// ── i18n: ilk locale yuklendiginde nav + sayfa yeniden render edilsin ──
function rerenderForI18n(){
  // Snapshot: scroll konumu + acik detail panel + acik legal modal
  const snapScrollY = window.scrollY || window.pageYOffset || 0;
  const dtoEl = document.getElementById('dto');
  const wasDtoOpen = !!(dtoEl && dtoEl.classList.contains('open'));
  const dtoId = wasDtoOpen ? window.__currentDtoId : null;
  const legalEl = document.getElementById('legalOv');
  const wasLegalOpen = !!(legalEl && legalEl.classList.contains('open'));
  const legalKey = wasLegalOpen ? window.__currentLegalKey : null;

  buildNav();
  wireDynamicLinks();
  // Aktif sayfayi i18n'li metinlerle yeniden ciz
  const id = curPage;
  if (id === 'projects'){
    // Filters/labels yeniden cizilecek - mevcut DOM'u temizle ki showPage tekrar kursun
    const ct = document.getElementById('content');
    if (ct){ ct.innerHTML = ''; }
    mapObj = null;  // map elementi de gitti
    markers = {};
    showPage('projects');
  } else {
    // Diger sayfalarda eski element'i sil + yeniden ciz
    const old = document.getElementById('pg-'+id);
    if (old) old.remove();
    showPage(id);
  }

  // Restore: scroll + detail panel + legal modal
  // requestAnimationFrame ile DOM mount sonrasi yapsin
  requestAnimationFrame(()=>{
    // Scroll geri
    try { window.scrollTo(0, snapScrollY); } catch(_){}
    // Detail panel - sadece projects sayfasindaysak
    if (wasDtoOpen && dtoId != null && curPage === 'projects'){
      // pg-projects mount sonrasi openD cagir; setTimeout ile tile'lar map'e dusene kadar bekle
      setTimeout(()=>{
        try { openD(dtoId); } catch(_){}
      }, 200);
    }
    // Legal modal yeniden ac
    if (wasLegalOpen && legalKey){
      try { openLegal(legalKey); } catch(_){}
    }
  });
}

if (window.I18N){
  // I18N hazir olunca ilk render (default TR de gelse de string'ler dict'ten gelmeli)
  window.I18N.ready.then(()=>{ rerenderForI18n(); });
  window.I18N.onChange(()=>{ rerenderForI18n(); });
}
