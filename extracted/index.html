<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1e3a5f;--pri-d:#152d4a;--pri-l:#eaf1f8;--pri-g:rgba(30,58,95,.2);
  --acc:#c8913a;--acc-d:#a87830;--acc-l:#fdf6ec;--acc-g:rgba(200,145,58,.2);
  --bg:#f7f5f2;--w:#fff;--dk:#1a1a2e;--tx:#3d3d4e;--txm:#8e8e9e;--brd:#e8e4df;
  --ok:#2d8a6e;--rad:14px;--rads:10px;
  --tr:.3s cubic-bezier(.4,0,.2,1);--sp:.5s cubic-bezier(.34,1.56,.64,1);
}
html,body{height:100%}
html{overflow:hidden}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}
body.modal-open{overflow:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none}

/* ── Particles ── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particles span{position:absolute;border-radius:50%;opacity:0;animation:pUp linear infinite}
@keyframes pUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.4}90%{opacity:.15}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* ── Topbar ── */
.topbar{
  background:rgba(255,255,255,.88);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(232,228,223,.6);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  flex-shrink:0;height:56px;z-index:100;position:relative;
}
.topbar .logo{height:36px;width:auto;flex-shrink:0;transition:transform var(--tr)}
.topbar .logo:hover{transform:scale(1.04)}
.topbar-nav{display:flex;gap:4px;margin:0 auto}
.nav-btn{padding:7px 16px;border-radius:50px;font-size:.76rem;font-weight:600;color:var(--txm);transition:all var(--tr)}
.nav-btn:hover{color:var(--pri);background:var(--pri-l)}
.nav-btn.on{color:var(--pri);background:var(--pri-l);font-weight:700}
.topbar-r{display:flex;gap:8px;flex-shrink:0}
.tb{padding:8px 18px;border-radius:50px;font-size:.76rem;font-weight:700;transition:all var(--tr);display:inline-flex;align-items:center;gap:6px}
.tb.acc{background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk);box-shadow:0 3px 12px var(--acc-g)}
.tb.pri{background:linear-gradient(135deg,var(--pri),#2a5078);color:#fff;box-shadow:0 3px 12px var(--pri-g)}
.tb:hover{transform:translateY(-2px)}
.tb.adm{background:var(--dk);color:var(--acc);display:none}

/* ── Content area ── */
.content{flex:1;min-height:0;position:relative;z-index:1;overflow:hidden}
.pg{display:none;position:absolute;inset:0;flex-direction:row}
.pg.on{display:flex}
.pg.scroll{overflow-y:auto;flex-direction:column}

/* ── Split layout (projects) ── */
.split{display:flex;width:100%;height:100%;overflow:hidden}
.side{width:380px;max-width:35vw;min-width:260px;display:flex;flex-direction:column;background:rgba(255,255,255,.75);backdrop-filter:blur(10px);border-right:1px solid rgba(232,228,223,.5);overflow:hidden;flex-shrink:0}
.filters{padding:14px 16px 10px;border-bottom:1px solid rgba(232,228,223,.5);background:rgba(255,255,255,.5)}
.filters-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 16px;border-radius:50px;font-size:.75rem;font-weight:600;color:var(--txm);background:rgba(240,238,235,.8);border:1.5px solid transparent;transition:all var(--sp);cursor:pointer}
.chip:hover{color:var(--pri);background:var(--pri-l);transform:translateY(-2px)}
.chip.on{background:linear-gradient(135deg,var(--pri),#2a5078);color:#fff;box-shadow:0 3px 14px var(--pri-g)}
.rcount{font-size:.7rem;color:var(--txm);margin-top:8px;font-weight:600}
.plist{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.plist::-webkit-scrollbar{width:4px}.plist::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}

/* ── Card ── */
.card{display:flex;background:rgba(255,255,255,.85);border:1.5px solid rgba(232,228,223,.6);border-radius:var(--rad);overflow:hidden;cursor:pointer;transition:all var(--tr);min-height:130px}
.card:hover{border-color:var(--pri);box-shadow:0 6px 24px var(--pri-g);transform:translateY(-2px)}
.card.on{border-color:var(--acc);box-shadow:0 6px 24px var(--acc-g);background:linear-gradient(135deg,rgba(253,246,236,.9),#fff)}
.card-img{width:120px;min-width:120px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;position:relative;overflow:hidden;background-size:cover;background-position:center}
.card-badge{position:absolute;top:6px;left:6px;padding:3px 10px;border-radius:50px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.card-body{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between}
.card-title{font-size:.88rem;font-weight:800;color:var(--dk);transition:color var(--tr)}.card:hover .card-title{color:var(--pri)}
.card-loc{font-size:.73rem;color:var(--txm);margin-top:2px}
.card-tags{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap}
.card-tag{background:rgba(240,238,235,.8);padding:2px 8px;border-radius:5px;font-size:.63rem;font-weight:600;color:var(--txm)}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:.88rem;font-weight:800;color:var(--pri)}
.card-price small{font-size:.63rem;font-weight:500;color:var(--txm)}
.dbtn{padding:7px 16px;border-radius:50px;background:linear-gradient(135deg,var(--pri),#2a5078);color:#fff;font-size:.7rem;font-weight:700;transition:all var(--sp);box-shadow:0 2px 8px var(--pri-g)}
.dbtn:hover{transform:scale(1.06);box-shadow:0 5px 18px var(--pri-g)}

/* ── Map ── */
.mapwrap{flex:1;position:relative;min-width:0;min-height:0;overflow:hidden}
#map{width:100%;height:100%;position:absolute;inset:0;z-index:1}
.leaflet-top,.leaflet-bottom{z-index:500!important}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 6px 24px rgba(0,0,0,.12)!important}
.leaflet-popup-content{margin:12px 16px!important;font-family:'Montserrat',sans-serif!important}
.pp-t{font-size:.85rem;font-weight:800;color:var(--dk)}.pp-l{font-size:.72rem;color:var(--txm)}.pp-p{font-size:.85rem;font-weight:800;color:var(--pri);margin-top:6px}
.pp-b{display:inline-block;margin-top:8px;padding:7px 18px;border-radius:50px;background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk);font-size:.72rem;font-weight:800;cursor:pointer}

/* ── Detail overlay ── */
.dto{position:absolute;top:0;right:0;bottom:0;width:100%;max-width:500px;background:rgba(255,255,255,.93);backdrop-filter:blur(22px);box-shadow:-10px 0 40px rgba(0,0,0,.1);z-index:1000;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid rgba(232,228,223,.4)}
.dto.open{transform:translateX(0)}
@keyframes dFade{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.dto-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(232,228,223,.5);background:rgba(255,255,255,.6)}
.dto-title{font-size:.95rem;font-weight:800;color:var(--dk)}
.dto-x{width:34px;height:34px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--tx);transition:all var(--sp)}.dto-x:hover{background:#fee2e2;color:#c0392b;transform:rotate(90deg)}
.dto-body{flex:1;overflow-y:auto;padding:20px}.dto-body::-webkit-scrollbar{width:3px}.dto-body::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}
.dto-hero{border-radius:var(--rad);height:180px;margin-bottom:18px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;background-size:cover;background-position:center}
.dto-hero .st{position:absolute;top:12px;left:12px;padding:6px 16px;border-radius:50px;font-size:.7rem;font-weight:800;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.dto-name{font-size:1.25rem;font-weight:900;color:var(--dk);margin-bottom:4px}
.dto-loc{font-size:.82rem;color:var(--txm);margin-bottom:16px}
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.qs{background:linear-gradient(135deg,rgba(30,58,95,.05),rgba(30,58,95,.02));border:1px solid rgba(30,58,95,.08);border-radius:var(--rads);padding:14px;text-align:center;transition:all var(--tr)}
.qs:hover{transform:translateY(-2px);box-shadow:0 4px 16px var(--pri-g)}
.qs .n{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--pri),#2a5078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.qs .l{font-size:.63rem;color:var(--txm);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.sec-t{font-size:.76rem;font-weight:800;color:var(--dk);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--brd),transparent)}
.atgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.atc{border:2px solid rgba(232,228,223,.6);border-radius:var(--rad);padding:16px;cursor:pointer;transition:all var(--sp);position:relative;background:rgba(255,255,255,.6)}
.atc:hover{border-color:var(--pri);background:var(--pri-l);transform:translateY(-2px)}
.atc.sel{border-color:var(--acc);background:linear-gradient(135deg,var(--acc-l),#fff);box-shadow:0 4px 16px var(--acc-g)}
.atc.sel::after{content:'✓';position:absolute;top:8px;right:10px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900}
.atc-n{font-size:.95rem;font-weight:800;color:var(--dk);margin-bottom:3px}.atc-s{font-size:.7rem;color:var(--txm)}.atc-p{font-size:.9rem;font-weight:800;color:var(--pri);margin-top:8px}
.ftgrid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.fti{padding:7px 14px;border-radius:50px;font-size:.73rem;font-weight:600;color:var(--tx);background:linear-gradient(135deg,rgba(240,238,235,.8),rgba(255,255,255,.5));border:1px solid rgba(232,228,223,.5);transition:all var(--tr)}
.fti:hover{border-color:var(--pri);color:var(--pri);transform:translateY(-1px)}
.ddesc{font-size:.82rem;color:var(--txm);line-height:1.8;margin-bottom:20px;padding:16px;border-radius:var(--rad);background:linear-gradient(135deg,rgba(240,238,235,.5),rgba(255,255,255,.3));border-left:3px solid var(--acc)}
.dto-cta{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);border-top:1px solid rgba(232,228,223,.5);padding:14px 20px;display:flex;gap:8px}
.cta{flex:1;padding:12px;border-radius:var(--rads);font-size:.82rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--sp);border:none;color:#fff}
.cta:hover{transform:translateY(-2px)}
.cta.ph{background:linear-gradient(135deg,var(--ok),#237a5e);box-shadow:0 3px 12px rgba(45,138,110,.25)}
.cta.wa{background:linear-gradient(135deg,#25d366,#1da851);box-shadow:0 3px 12px rgba(37,211,102,.25)}
.cta.ms{background:linear-gradient(135deg,var(--pri),#2a5078);box-shadow:0 3px 12px var(--pri-g)}
.cmini{margin-bottom:20px}.cmini h4{font-size:.76rem;font-weight:800;color:var(--dk);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}.cmini h4::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--brd),transparent)}
.mfg{margin-bottom:8px}.mfg input,.mfg textarea{width:100%;padding:11px 14px;border:2px solid rgba(232,228,223,.6);border-radius:var(--rads);font-size:.82rem;font-family:inherit;transition:all var(--tr);background:rgba(240,238,235,.5)}.mfg input:focus,.mfg textarea:focus{outline:none;border-color:var(--pri);background:#fff;box-shadow:0 0 0 3px rgba(30,58,95,.06)}.mfg textarea{resize:none;height:60px}
.msub{width:100%;padding:12px;border-radius:var(--rads);background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk);font-size:.85rem;font-weight:800;transition:all var(--sp);box-shadow:0 3px 12px var(--acc-g)}.msub:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--acc-g)}

/* ── Generic page ── */
.gpage{padding:50px 60px;max-width:1100px;margin:0 auto;width:100%}
.gpage h1{font-size:2rem;font-weight:900;color:var(--dk);margin-bottom:8px}
.gpage .divider{width:50px;height:3px;background:linear-gradient(90deg,var(--acc),var(--pri));border-radius:2px;margin:12px 0 20px}
.gpage .sub{font-size:.92rem;color:var(--txm);line-height:1.7;margin-bottom:30px;max-width:700px}
.gcards{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
.gcard{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-radius:var(--rad);padding:30px;border:1px solid rgba(232,228,223,.5);transition:all var(--tr)}.gcard:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.08)}
.gcard h3{font-size:1rem;font-weight:800;color:var(--dk);margin-bottom:10px}.gcard p{font-size:.85rem;color:var(--txm);line-height:1.7}
.gstats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px}
.gstat{text-align:center;background:rgba(255,255,255,.88);border-radius:var(--rad);padding:24px;border:1px solid rgba(232,228,223,.5);transition:all var(--tr)}.gstat:hover{transform:translateY(-3px);box-shadow:0 6px 20px var(--pri-g);border-color:var(--pri)}
.gstat .n{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--pri),#2a5078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gstat .l{font-size:.74rem;color:var(--txm);font-weight:600;margin-top:4px}
.gvals{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.gval{text-align:center;padding:24px;background:rgba(255,255,255,.88);border-radius:var(--rad);border:1px solid rgba(232,228,223,.5);transition:all var(--tr)}.gval:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.gval .icon{font-size:1.8rem;margin-bottom:8px}.gval h4{font-size:.85rem;font-weight:800;color:var(--dk);margin-bottom:6px}.gval p{font-size:.76rem;color:var(--txm);line-height:1.6}
/* Contact grid */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.cinfo{background:rgba(255,255,255,.88);border-radius:var(--rad);padding:28px;border:1px solid rgba(232,228,223,.5)}
.cinfo h3{font-size:.88rem;font-weight:800;color:var(--dk);margin-bottom:14px}
.citem{display:flex;gap:10px;margin-bottom:14px;font-size:.82rem;color:var(--tx)}.citem .ci{font-size:1.1rem;flex-shrink:0}
.cform{background:rgba(255,255,255,.88);border-radius:var(--rad);padding:28px;border:1px solid rgba(232,228,223,.5)}
.cform h3{font-size:.88rem;font-weight:800;color:var(--dk);margin-bottom:14px}
.cfg{margin-bottom:12px}.cfg label,.mfg label{display:block;font-size:.72rem;font-weight:700;color:var(--txm);margin-bottom:4px}
.cfg input,.cfg textarea{width:100%;padding:10px 12px;border:2px solid var(--brd);border-radius:var(--rads);font-size:.82rem;font-family:inherit;transition:all var(--tr);background:var(--bg)}.cfg input:focus,.cfg textarea:focus{outline:none;border-color:var(--pri);background:#fff}.cfg textarea{resize:none;height:80px}

/* ── Admin overlay ── */
.adm-ov{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.5);backdrop-filter:blur(6px)}
.adm-ov.open{display:flex;align-items:center;justify-content:center}
.adm-box{width:94vw;max-width:1050px;height:88vh;background:var(--w);border-radius:18px;box-shadow:0 16px 60px rgba(0,0,0,.2);display:flex;overflow:hidden;animation:aIn .3s ease-out}
@keyframes aIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.adm-side{width:220px;background:var(--dk);color:#fff;padding:20px 0;display:flex;flex-direction:column;flex-shrink:0}
.adm-side-t{padding:0 18px 16px;font-size:.8rem;font-weight:800;color:var(--acc);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px;letter-spacing:.8px}
.adm-ni{padding:10px 18px;font-size:.78rem;font-weight:600;cursor:pointer;color:rgba(255,255,255,.5);transition:all var(--tr);display:flex;align-items:center;gap:8px;border-left:3px solid transparent}
.adm-ni:hover{color:#fff;background:rgba(255,255,255,.04)}.adm-ni.on{color:var(--acc);background:rgba(247,166,0,.06);border-left-color:var(--acc)}
.adm-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.adm-head{padding:18px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.adm-head h2{font-size:1.1rem;font-weight:800;color:var(--dk)}
.adm-cls{width:36px;height:36px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--tx);cursor:pointer;transition:all var(--tr)}.adm-cls:hover{background:#fee2e2;color:#c0392b}
.adm-bd{flex:1;overflow-y:auto;padding:24px}.adm-bd::-webkit-scrollbar{width:4px}.adm-bd::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}
.af{margin-bottom:14px}.af label{display:block;font-size:.72rem;font-weight:700;color:var(--txm);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.af input,.af textarea,.af select{width:100%;padding:10px 12px;border:2px solid var(--brd);border-radius:var(--rads);font-size:.82rem;font-family:inherit;transition:all var(--tr);background:var(--bg)}.af input:focus,.af textarea:focus,.af select:focus{outline:none;border-color:var(--pri);background:#fff}
.af textarea{resize:vertical;min-height:70px}
.ar2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ar3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.abtn{padding:10px 24px;border-radius:var(--rads);font-size:.82rem;font-weight:800;transition:all var(--tr);border:none;cursor:pointer}
.abtn.sv{background:linear-gradient(135deg,var(--pri),#2a5078);color:#fff;box-shadow:0 3px 12px var(--pri-g)}.abtn.sv:hover{transform:translateY(-2px)}
.abtn.dn{background:linear-gradient(135deg,#c0392b,#a93226);color:#fff}.abtn.sc{background:var(--bg);color:var(--tx);border:2px solid var(--brd)}.abtn.ac{background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk)}
.acl{display:flex;flex-direction:column;gap:8px}.aci{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-radius:var(--rads);border:1px solid var(--brd);transition:all var(--tr)}.aci:hover{border-color:var(--pri);background:var(--pri-l)}
.aci-i{flex:1}.aci-n{font-size:.85rem;font-weight:700;color:var(--dk)}.aci-m{font-size:.7rem;color:var(--txm);margin-top:1px}
.aci-a{display:flex;gap:5px}.aci-b{padding:5px 12px;border-radius:50px;font-size:.7rem;font-weight:700;cursor:pointer;transition:all var(--tr);border:none}
.aci-b.ed{background:var(--pri-l);color:var(--pri)}.aci-b.ed:hover{background:var(--pri);color:#fff}
.aci-b.dl{background:#fef2f2;color:#c0392b}.aci-b.dl:hover{background:#c0392b;color:#fff}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 22px;border-radius:var(--rads);background:var(--dk);color:#fff;font-size:.82rem;font-weight:700;z-index:99999;box-shadow:0 8px 30px rgba(0,0,0,.2);display:none;animation:tIn .3s ease-out}
.toast.show{display:block}@keyframes tIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Footer ── */
.site-footer{
  background:var(--dk);color:rgba(255,255,255,.7);padding:40px 30px 20px;flex-shrink:0;
}
.footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.footer-col h4{font-size:.82rem;font-weight:800;color:var(--acc);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.footer-col p,.footer-col a{font-size:.78rem;line-height:1.8;color:rgba(255,255,255,.6)}
.footer-col a:hover{color:var(--acc)}
.footer-col .footer-link{display:block;margin-bottom:4px;transition:color var(--tr)}
.footer-bottom{max-width:1100px;margin:20px auto 0;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:rgba(255,255,255,.4)}
.footer-social{display:flex;gap:10px}
.footer-social a{font-size:1rem;transition:transform var(--tr)}
.footer-social a:hover{transform:scale(1.2)}

/* ── Form Validation ── */
.cfg input.invalid,.cfg textarea.invalid,.mfg input.invalid,.mfg textarea.invalid{border-color:#c0392b;background:#fef2f2}
.cfg input.invalid::placeholder,.cfg textarea.invalid::placeholder,.mfg input.invalid::placeholder,.mfg textarea.invalid::placeholder{color:#c0392b80}
.field-error{font-size:.65rem;color:#c0392b;font-weight:600;margin-top:3px;display:none}
.field-error.show{display:block}

/* ── Cookie Consent Banner (KVKK) ── */
.cookie-banner{position:fixed;bottom:0;left:0;right:0;z-index:9000;background:rgba(26,26,46,.97);backdrop-filter:blur(12px);color:#fff;padding:16px 20px;box-shadow:0 -6px 24px rgba(0,0,0,.18);display:none;animation:cbUp .4s ease-out}
.cookie-banner.show{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
@keyframes cbUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.cookie-banner .cb-txt{flex:1;min-width:260px;font-size:.8rem;line-height:1.55;color:rgba(255,255,255,.85)}
.cookie-banner .cb-txt b{color:var(--acc);font-weight:800}
.cookie-banner .cb-txt a{color:var(--acc);text-decoration:underline;cursor:pointer}
.cookie-banner .cb-btns{display:flex;gap:8px;flex-shrink:0}
.cookie-banner .cb-btn{padding:10px 22px;border-radius:50px;font-size:.78rem;font-weight:700;transition:all var(--tr);border:none;cursor:pointer}
.cookie-banner .cb-btn.acc{background:linear-gradient(135deg,var(--acc),#daa64e);color:var(--dk)}
.cookie-banner .cb-btn.rej{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.22)}
.cookie-banner .cb-btn:hover{transform:translateY(-1px)}
/* ── Legal modal (KVKK / Cerez Politikasi) ── */
.legal-ov{display:none;position:fixed;inset:0;z-index:9500;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.legal-ov.open{display:flex}
.legal-box{width:100%;max-width:720px;max-height:85vh;background:var(--w);border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.22);display:flex;flex-direction:column;overflow:hidden;animation:aIn .3s ease-out}
.legal-head{padding:18px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.legal-head h2{font-size:1.05rem;font-weight:800;color:var(--dk)}
.legal-bd{flex:1;overflow-y:auto;padding:22px 26px;font-size:.85rem;line-height:1.75;color:var(--tx)}
.legal-bd h3{font-size:.92rem;font-weight:800;color:var(--dk);margin:16px 0 8px}
.legal-bd h3:first-child{margin-top:0}
.legal-bd p{margin-bottom:10px}
.legal-bd ul{margin:8px 0 12px 20px}
.legal-bd li{margin-bottom:4px}
.legal-note{display:none;background:#fef3c7;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:8px;margin-top:14px;font-size:.76rem;color:#78350f} /* demo: hukuk review sonrasi display:none kaldirilacak */
/* ── Loan Calculator ── */
.loan-section{background:linear-gradient(135deg,rgba(30,58,95,.04),rgba(200,145,58,.04));border-radius:var(--rad);padding:32px;margin:28px 0;border:1px solid rgba(232,228,223,.6)}
.loan-section h2{font-size:1.4rem;font-weight:900;color:var(--dk);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.loan-section .loan-sub{font-size:.82rem;color:var(--txm);margin-bottom:22px;max-width:640px}
.loan-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.loan-inputs{display:flex;flex-direction:column;gap:14px}
.loan-field label{display:block;font-size:.74rem;font-weight:700;color:var(--txm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.loan-field input{width:100%;padding:12px 14px;border:2px solid rgba(232,228,223,.6);border-radius:var(--rads);font-size:.9rem;font-weight:600;font-family:inherit;transition:all var(--tr);background:#fff;color:var(--dk)}
.loan-field input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(30,58,95,.08)}
.loan-field .loan-hint{font-size:.68rem;color:var(--txm);margin-top:3px}
.loan-field input.invalid{border-color:#c0392b;background:#fef2f2}
.loan-results{background:#fff;border-radius:var(--rad);padding:24px;border:1px solid rgba(232,228,223,.5);box-shadow:0 4px 18px rgba(30,58,95,.06)}
.loan-results h3{font-size:.82rem;font-weight:800;color:var(--dk);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.loan-row{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px dashed var(--brd)}
.loan-row:last-child{border-bottom:none}
.loan-row .lr-lbl{font-size:.82rem;color:var(--txm);font-weight:600}
.loan-row .lr-val{font-size:1.05rem;font-weight:800;color:var(--dk)}
.loan-row.total .lr-val{font-size:1.35rem;background:linear-gradient(135deg,var(--pri),#2a5078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.loan-row.interest .lr-val{color:var(--acc-d)}
.loan-disclaimer{font-size:.68rem;color:var(--txm);margin-top:14px;font-style:italic;line-height:1.5}
/* ── Photo-pending badge ── */
.card-photo-pending{position:absolute;top:6px;right:6px;padding:3px 9px;border-radius:50px;font-size:.56rem;font-weight:700;background:rgba(0,0,0,.55);color:#fff;letter-spacing:.3px;backdrop-filter:blur(4px)}
/* ── YouTube embed ── */
.yt-wrap{position:relative;width:100%;padding-bottom:56.25%;margin-bottom:18px;border-radius:var(--rad);overflow:hidden;background:#000}
.yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.yt-placeholder{position:relative;width:100%;padding-bottom:56.25%;margin-bottom:18px;border-radius:var(--rad);overflow:hidden;background:linear-gradient(135deg,rgba(30,58,95,.1),rgba(200,145,58,.08));border:1px dashed rgba(30,58,95,.2)}
.yt-placeholder .yt-ph-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txm);font-size:.8rem;font-weight:600;gap:6px}
.yt-placeholder .yt-ph-in span{font-size:1.8rem}
/* ── Stat icons ── */
.gstat .stat-icon{width:36px;height:36px;margin:0 auto 8px;color:var(--pri);opacity:.85}
.gstat .stat-icon svg{width:100%;height:100%}
/* ── Admin: map location picker ── */
.ep-mappick{margin-top:6px;border-radius:var(--rads);overflow:hidden;border:1px solid var(--brd);background:#eef1f4}
.ep-mappick-hint{font-size:.68rem;color:var(--txm);margin-top:4px}
#ep_mini_map{height:230px;width:100%;border-radius:var(--rads)}
/* ── Admin: photo uploader ── */
.ph-upload{margin-top:6px}
.ph-upload-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rads);background:var(--pri-l);color:var(--pri);font-size:.78rem;font-weight:700;cursor:pointer;border:2px dashed rgba(30,58,95,.3);transition:all var(--tr)}
.ph-upload-btn:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.ph-upload input[type=file]{display:none}
.ph-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px}
.ph-thumb{position:relative;aspect-ratio:1/1;border-radius:var(--rads);overflow:hidden;background:#eee;border:1px solid var(--brd)}
.ph-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ph-thumb .ph-x{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(15,23,42,.75);color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all var(--tr)}
.ph-thumb .ph-x:hover{background:#c0392b;transform:scale(1.1)}
.ph-count{font-size:.68rem;color:var(--txm);margin-top:4px;font-weight:600}
/* ── YouTube preview (admin) ── */
.yt-preview{margin-top:8px;position:relative;width:100%;padding-bottom:56.25%;border-radius:var(--rads);overflow:hidden;background:#000;display:none}
.yt-preview.on{display:block}
.yt-preview iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
/* ── House types checkboxes ── */
.htypes-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.htype-chk{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;border:1.5px solid var(--brd);background:var(--bg);cursor:pointer;font-size:.76rem;font-weight:600;color:var(--tx);transition:all var(--tr);user-select:none}
.htype-chk:hover{border-color:var(--pri);color:var(--pri)}
.htype-chk input{margin:0;cursor:pointer;accent-color:var(--pri)}
.htype-chk.on{background:var(--pri-l);border-color:var(--pri);color:var(--pri);font-weight:700}
/* ── Card tags single-line + more chip ── */
.card-tags{flex-wrap:nowrap!important;overflow:hidden;height:auto}
.card-tag{white-space:nowrap;flex-shrink:0}
.card-tag-more{background:var(--pri-l);color:var(--pri);padding:2px 8px;border-radius:5px;font-size:.63rem;font-weight:700;flex-shrink:0;white-space:nowrap}
.card{min-height:140px}
/* ── Detail drawer: house types ── */
.dto-htypes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.dto-htype{background:linear-gradient(135deg,var(--acc-l),#fff);border:1px solid rgba(200,145,58,.3);padding:6px 14px;border-radius:50px;font-size:.73rem;font-weight:700;color:var(--acc-d)}
/* ── Detail drawer: photos grid ── */
.dto-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:18px}
.dto-photo{aspect-ratio:1/1;border-radius:var(--rads);overflow:hidden;cursor:pointer;background:#eee;border:1px solid var(--brd);transition:all var(--tr)}
.dto-photo:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.dto-photo img{width:100%;height:100%;object-fit:cover;display:block}
/* ── Loan rate unit toggle ── */
.ln-rate-toggle{display:inline-flex;gap:0;margin-bottom:6px;border:1.5px solid var(--brd);border-radius:50px;padding:3px;background:var(--bg)}
.ln-rate-toggle label{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:50px;cursor:pointer;font-size:.72rem;font-weight:700;color:var(--txm);transition:all var(--tr)}
.ln-rate-toggle input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.ln-rate-toggle label:has(input:checked){background:linear-gradient(135deg,var(--pri),#2a5078);color:#fff;box-shadow:0 2px 8px var(--pri-g)}
.ln-rate-conv{font-size:.68rem;color:var(--acc-d);margin-top:4px;font-weight:600;font-style:italic;min-height:1em}
/* ── Mobile cookie banner ── */
@media(max-width:640px){
  .cookie-banner{padding:14px;flex-direction:column;align-items:stretch;gap:12px}
  .cookie-banner .cb-btns{justify-content:stretch}
  .cookie-banner .cb-btn{flex:1}
  .loan-grid{grid-template-columns:1fr;gap:18px}
  .loan-section{padding:20px}
}
/* ── Responsive ── */
@media(max-width:950px){
  .side{width:300px;max-width:38vw;min-width:220px}
  .card-img{width:100px;min-width:100px}
  .gpage{padding:30px 24px}
  .gcards,.gstats,.gvals,.cgrid{grid-template-columns:1fr}
  .gstats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .topbar{flex-wrap:wrap;height:auto;padding:10px 12px;gap:6px}
  .topbar-nav{order:3;width:100%;justify-content:center;padding-top:6px;border-top:1px solid var(--brd);gap:2px}
  .nav-btn{padding:5px 10px;font-size:.7rem}.tb{padding:6px 12px;font-size:.7rem}
  .split{flex-direction:column;overflow-y:auto}
  .side{width:100%!important;max-width:100%!important;min-width:auto!important;height:auto;max-height:38vh;flex-shrink:0;border-right:none;border-bottom:1px solid var(--brd)}
  .mapwrap{flex:1;min-height:250px}
  #map{position:relative;min-height:250px}
  .dto{max-width:100%}.dto-cta{flex-direction:column}
  .adm-box{flex-direction:column;width:98vw;height:94vh}.adm-side{width:100%;flex-direction:row;padding:8px;overflow-x:auto}.adm-ni{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:8px 12px}.adm-ni.on{border-bottom-color:var(--acc);border-left-color:transparent}
  .footer-inner{grid-template-columns:1fr!important}
  .footer-bottom{flex-direction:column;gap:8px;text-align:center}
}

/* ═══════════════════════════════════════════════════
   PAGE BUILDER v1 — Editor.js tabanli inline editor

.gpage .pb-p a{color:var(--pri);font-weight:600;text-decoration:underline;text-underline-offset:3px}
.gpage .pb-p a:hover{color:var(--acc-d)}
.gpage .pb-list{margin:12px 0 14px 26px;font-size:.92rem;line-height:1.75;color:var(--tx)}

/* ── Galeri (multi-image grid) ── */
.gpage .pb-gallery{display:grid;gap:10px;margin:16px 0}

.gpage .pb-gal-3{grid-template-columns:repeat(3,1fr)}
.gpage .pb-gal-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:640px){.gpage .pb-gal-3,.gpage .pb-gal-4{grid-template-columns:repeat(2,1fr)}}
.gpage .pb-gal-item{margin:0;display:flex;flex-direction:column}
.gpage .pb-gal-item img{aspect-ratio:16/9;object-fit:cover;width:100%;border-radius:8px;display:block}
.gpage .pb-gal-item figcaption{font-size:.72rem;color:var(--txm);margin-top:4px;text-align:center}
/* ── Editor.js image preview 16:9 override ── */
#page_editor .ce-block .image-tool__image-picture,
#page_editor .ce-block .image-tool__image-picture img{aspect-ratio:16/9;object-fit:cover;width:100%}

      en: "With the trust given by our engineering and architectural technical staff, we aim to provide comfortable usable spaces in livable environments while ensuring that the reinforced concrete building rises safely and becomes a symbol of peace and comfort within the community. Our insulation values are not just about exterior cladding, but about wrapping the building entirely so that maximum thermal insulation efficiency is achieved and energy loss is prevented. We do not apply insulation arbitrarily; we use stone wool cladding, which has a fire-resistant property and lasts the lifetime of the building. We deliver our residences turn-key, giving our customers full freedom to choose colors and models for every detail. We use high brand-value products manufactured under TSE and ISO quality assurance.\nIn construction, our priorities are quality and trust.\nOur company holds the ISO 9001 quality assurance certificate and operates with this quality understanding. Founded in 2004, our firm employs qualified technical personnel who provide active consultancy services while producing new projects with architectural distinctions, raising the image of the surroundings.\nTo this day, we have been a partner to our customers through projects such as Adapazari Ozanlar and Seker Mahallesi, Gunesler, Tepekum, Cevizli Park Evleri 2-3, Altinova Cark Evleri, Akademi Evleri, Gunes Evler Sitesi, Cevizlipark 4, Gunesler Nehirpark Evleri, Turna Evleri, Merkez Evleri, Sehri Bahce Evleri, Karasu Yali Evleri, Deniz Yalisi Apartlar, Karasu Yuvam Sitesi, Karasu Ari Apartmani, Gunesler Basak 1 Evleri and Yagcilar Arena54 Evleri.\nAs the name suggests, Safakari Construction stands for honesty and dynamism — projects delivered flawlessly and on time with a corporate identity that values quality and trust. Rather than a city of mere concrete, we work to be the architects of a properly urbanized modern city, sustained by the support we receive from our customers.\nWHY SAFAKARI\nSafakari Construction places its corporate identity above the individual, treats customer satisfaction as a non-negotiable principle, and continuously produces new and livable projects. We see \"building\" not as four walls but as the guarantee of a healthy and comfortable life. With our nature-respecting identity, we share with our customers the well-earned joy of living in the brand value of our completed projects. Safakari Construction has always been the embodiment of maximum comfort and ease — principled, innovative, attentive to customer ideas, and open to diverse richness.",
      ru: "Опираясь на доверие, которое нам оказывает наша инженерно-архитектурная команда, мы стремимся обеспечивать комфортные жилые пространства в пригодных для жизни помещениях, а также добиваемся того, чтобы железобетонное здание поднималось с уверенностью и становилось символом покоя и комфорта в обществе. Наши теплоизоляционные решения не сводятся лишь к фасадному утеплению: мы оборачиваем здание целиком, обеспечивая максимальную энергоэффективность и предотвращая потери тепла. Мы не применяем утепление случайно — используем каменно-ватные системы, которые не горят и служат столько же, сколько само здание. Квартиры мы сдаём «под ключ», предоставляя клиенту полную свободу в выборе цвета и моделей по каждой детали. Мы используем продукцию с высокой марочной стоимостью, произведённую с гарантией качества TSE и ISO.\nВ строительстве наш приоритет — качество и доверие.\nНаша компания обладает сертификатом качества ISO 9001 и работает в соответствии с этим стандартом. Основанная в 2004 году, наша фирма располагает квалифицированным техническим персоналом, оказывающим активные консультационные услуги, а также реализует архитектурно своеобразные новые проекты, повышая образ своего района.\nПо сей день мы поддерживали наших клиентов в таких проектах, как Adapazari Ozanlar и Seker Mahallesi, Gunesler, Tepekum, Cevizli Park Evleri 2-3, Altinova Cark Evleri, Akademi Evleri, Gunes Evler Sitesi, Cevizlipark 4, Gunesler Nehirpark Evleri, Turna Evleri, Merkez Evleri, Sehri Bahce Evleri, Karasu Yali Evleri, Deniz Yalisi Apartlar, Karasu Yuvam Sitesi, Karasu Ari Apartmani, Gunesler Basak 1 Evleri и Yagcilar Arena54 Evleri.\nКак и подсказывает её название, Safakari Construction означает честность и динамику — проекты, сданные безупречно и в срок, корпоративная идентичность, ценящая качество и доверие. Мы стремимся быть не строителями города из бетона, а создателями правильно урбанизированного современного города, опираясь на поддержку наших клиентов.\nПОЧЕМУ SAFAKARI\nSafakari Construction ставит корпоративную идентичность выше индивидуальной, относится к удовлетворённости клиента как к незыблемому принципу и постоянно создаёт новые и пригодные для жизни проекты. Слово «здание» для нас — не четыре стены, а гарантия здоровой и комфортной жизни. Своей уважающей природу идентичностью мы делимся с клиентами заслуженной радостью от марочной ценности завершённых проектов. Safakari Construction всегда оставалась воплощением максимального комфорта — принципиальной, инновационной, внимательной к идеям клиента и открытой к разнообразному богатству.",
      ar: "بفضل الثقة التي يضعها فينا فريقنا الهندسي والمعماري، نسعى إلى توفير مساحات معيشة مريحة وعملية في بيئات صالحة للسكن، مع ضمان ارتفاع المبنى الخرساني المسلح بأمان ليصبح رمزاً للراحة والطمأنينة داخل المجتمع. لا تقتصر قيم العزل لدينا على إكساء الواجهة، بل نغلف المبنى بالكامل لتحقيق أقصى كفاءة عزل حراري ومنع تسرب الطاقة. نطبق العزل بأسلوب مدروس باستخدام صوف الصخر، الذي يتميز بمقاومة الحريق ويدوم طوال عمر المبنى. نسلم وحداتنا السكنية جاهزة بالكامل، ونتيح لعملائنا الحرية الكاملة في اختيار الألوان والموديلات لكل تفصيلة. نستخدم منتجات ذات قيمة علامة تجارية عالية ومصنّعة وفق ضمانات الجودة TSE و ISO.\nفي البناء، أولوياتنا هي الجودة والثقة.\nتمتلك شركتنا شهادة ضمان الجودة ISO 9001 وتعمل وفق هذا المفهوم. تأسست شركتنا عام 2004، وتضم فريقاً تقنياً مؤهلاً يقدم خدمات استشارية فاعلة، فيما تنتج مشاريع جديدة بمزايا معمارية متميزة ترفع صورة المحيط.\nحتى اليوم، رافقنا عملاءنا في مشاريع مثل Adapazari Ozanlar و Seker Mahallesi و Gunesler و Tepekum و Cevizli Park Evleri 2-3 و Altinova Cark Evleri و Akademi Evleri و Gunes Evler Sitesi و Cevizlipark 4 و Gunesler Nehirpark Evleri و Turna Evleri و Merkez Evleri و Sehri Bahce Evleri و Karasu Yali Evleri و Deniz Yalisi Apartlar و Karasu Yuvam Sitesi و Karasu Ari Apartmani و Gunesler Basak 1 Evleri و Yagcilar Arena54 Evleri.\nكما يوحي اسمها، تعني Safakari Construction الصدق والديناميكية — مشاريع تُسلَّم بإتقان وفي وقتها، وهوية مؤسسية تضع الجودة والثقة في المقدمة. لسنا بُناة مدينة من خرسانة فحسب، بل نسعى لأن نكون صنّاع مدينة عصرية مُعمَّرة بشكل صحيح، بدعم من عملائنا.\nلماذا Safakari\nتضع Safakari Construction هويتها المؤسسية فوق الهوية الفردية، وتعدّ رضا العميل مبدأً لا يقبل المساومة، وتنتج باستمرار مشاريع جديدة وصالحة للسكن. كلمة «بناء» بالنسبة لنا ليست أربعة جدران، بل ضمانة لحياة صحية ومريحة. بهويتنا التي تحترم الطبيعة، نشارك عملاءنا فرحة استحقاقهم بقيمة مشاريعنا المنجزة. ظلّت Safakari Construction دوماً تجسيداً لأقصى درجات الراحة — مبدئية، ومبدعة، ومنصتة لأفكار العميل، ومنفتحة على ثراء التنوع.",
      de: "Mit dem Vertrauen, das uns unser Ingenieur- und Architekturteam entgegenbringt, schaffen wir komfortable Nutzflächen in bewohnbaren Räumen und sorgen zugleich dafür, dass das Stahlbetongebäude sicher emporsteigt und zu einem Symbol für Ruhe und Komfort innerhalb der Gemeinschaft wird. Unsere Dämmwerte beschränken sich nicht auf die Fassadendämmung, sondern umhüllen das Gebäude vollständig, sodass maximale Wärmedämmeffizienz erreicht und Energieverluste vermieden werden. Wir setzen Dämmung nicht beliebig ein; wir verwenden Steinwolle-Verkleidung, die nicht brennbar ist und die gesamte Lebensdauer des Gebäudes überdauert. Wir übergeben unsere Wohnungen schlüsselfertig und gewähren unseren Kunden die volle Freiheit bei Farb- und Modellwahl in jedem Detail. Wir verwenden markenstarke Produkte, die unter TSE- und ISO-Qualitätsgarantie gefertigt sind.\nIm Bauwesen sind unsere Prioritäten Qualität und Vertrauen.\nUnser Unternehmen besitzt das Qualitätszertifikat ISO 9001 und arbeitet konsequent nach diesem Verständnis. Gegründet im Jahr 2004, beschäftigt unsere Firma qualifiziertes technisches Personal, das aktive Beratungsleistungen erbringt, und realisiert zugleich architektonisch eigenständige Neubauprojekte, die das Image ihrer Umgebung aufwerten.\nBis heute haben wir unsere Kunden in Projekten wie Adapazari Ozanlar und Seker Mahallesi, Gunesler, Tepekum, Cevizli Park Evleri 2-3, Altinova Cark Evleri, Akademi Evleri, Gunes Evler Sitesi, Cevizlipark 4, Gunesler Nehirpark Evleri, Turna Evleri, Merkez Evleri, Sehri Bahce Evleri, Karasu Yali Evleri, Deniz Yalisi Apartlar, Karasu Yuvam Sitesi, Karasu Ari Apartmani, Gunesler Basak 1 Evleri und Yagcilar Arena54 Evleri begleitet.\nWie der Name andeutet, steht Safakari Bau für Aufrichtigkeit und Dynamik — Projekte, die makellos und termingerecht übergeben werden, mit einer Unternehmensidentität, die Qualität und Vertrauen in den Mittelpunkt stellt. Statt einer betonierten Stadt wollen wir die Architekten einer richtig urbanisierten modernen Stadt sein, getragen von der Unterstützung unserer Kunden.\nWARUM SAFAKARI\nSafakari Bau stellt seine Unternehmensidentität über die individuelle, betrachtet Kundenzufriedenheit als unverhandelbares Prinzip und entwickelt stets neue, lebenswerte Projekte. „Bauen“ heißt für uns nicht vier Wände, sondern Garantie für ein gesundes, komfortables Leben. Mit unserer naturschonenden Identität teilen wir mit unseren Kunden die wohlverdiente Freude am Markenwert unserer fertiggestellten Projekte. Safakari Bau ist seit jeher der Inbegriff höchster Bequemlichkeit — prinzipientreu, innovativ, aufmerksam für Kundenideen und offen für vielfältige Reichtümer."
    },

        en: "Nehirpark2 in Tepekum, Sakarya Adapazari: 36 luxury apartments with 2+1 and 3+1 options — a distinctive structure that delivers far more than your investment in prestige and comfort. Tepekum, with its central location amid important investments such as schools, hotels and Nehirpark, is becoming the gem of Sakarya. Built with selective and unique architecture, Nehirpark2 brings the comfort of luxury together with the calm of nature; nature-friendly and crafted with different textures. Next to the new Gunesler stadium; spacious 3+1 layouts; 2- or 3-aspect units with 2 balconies; 25 m² in-unit shared area and storage; one assigned outdoor parking spot. 3 blocks — 36 apartments; pedestrian areas adjacent, outdoor parking, brand-new with a 5-year warranty. Nehirpark, Basak1 and Nehirpark2 are Safakari Construction projects. Tepekum: 200 m to the Karasu road, 100 m to the newly opened street, 600 m to Basaksehir College, 200 m to Anadolu High School.",

        ar: "Nehirpark2 في حي Tepekum بمدينة Sakarya Adapazari: 36 شقة فاخرة بخيارات 2+1 و 3+1 — مبنى متميز يقدّم أكثر بكثير من قيمة استثمارك من حيث الفخامة والراحة. حيث Tepekum، بموقعه المركزي بين استثمارات مهمة كالمدارس والفنادق ومشروع Nehirpark، يتحول إلى جوهرة Sakarya. شُيّد Nehirpark2 بعمارة مميزة وفريدة تجمع راحة الفخامة مع سكون الطبيعة، صديق للبيئة وبتصاميم نسيجية متنوعة. بجانب ملعب Gunesler الجديد؛ شقق 3+1 رحبة؛ وحدات بواجهتين أو ثلاث وشرفتين؛ 25 m² منطقة مشتركة ومخزن داخل الشقة؛ موقف خارجي مخصص لسيارة واحدة. 3 بلوكات — 36 شقة؛ مناطق مشي قريبة، مرآب مفتوح، جديد كلياً مع ضمان 5 سنوات. Nehirpark و Basak1 و Nehirpark2 من مشاريع Safakari. Tepekum: 200 m إلى طريق Karasu، 100 m إلى الشارع المفتوح حديثاً، 600 m إلى كلية Başakşehir، و200 m إلى Anadolu Lisesi.",
        de: "Nehirpark2 in Tepekum, Sakarya Adapazari: 36 Luxuswohnungen in 2+1 und 3+1 — eine besondere Struktur, die Ihre Investition in Prestige und Komfort weit übertrifft. Tepekum entwickelt sich durch seine zentrale Lage inmitten wichtiger Investitionen wie Schulen, Hotels und Nehirpark zum Juwel von Sakarya. Nehirpark2 ist mit eigenständiger und einzigartiger Architektur gebaut und verbindet den Komfort des Luxus mit der Ruhe der Natur; naturnah und mit unterschiedlichen Texturen gestaltet. Direkt am neuen Gunesler-Stadion; großzügige 3+1; 2- oder 3-seitige Einheiten mit 2 Balkonen; 25 m² gemeinsamer Bereich und Lager innerhalb der Wohnung; ein zugewiesener Außenstellplatz. 3 Blöcke — 36 Wohnungen; Fußgängerzonen in der Nähe, Außenparkplatz, fabrikneu mit 5 Jahren Garantie. Nehirpark, Basak1 und Nehirpark2 sind Projekte von Safakari Bau. Tepekum: 200 m zur Karasu-Straße, 100 m zur neu eröffneten Straße, 600 m zum Basaksehir-Kolleg, 200 m zum Anadolu-Lisesi."

        en: "A nine-block development with 102 apartments, with blocks A-B-C-D-E-F-G-H-I. 2,000 m to the city center, only 200 m to the new Sakarya Stadium, and 300 m to the planned park along the Sakarya River. In Sakarya Adapazari, near Gunesler Stadium. 140 m² 3+1, 145 m² 3+1, 105 m² 2+1. Spacious 3+1 layouts; 2- or 3-aspect units with 2 balconies, en-suite bathroom and laundry room; built-in kitchen appliances; 3 m² in-unit dedicated storage; one assigned outdoor parking spot. Windows: TSE-certified PVC; glazing 4+16+4 thermal. Kitchen cabinets in acrylic or membrane-finish MDF; granite countertops with chrome sinks. Interior doors: wood-look composite or PVC-laminated VARIO MDF doors; entry doors are steel. Interior walls: 10 cm pumice block with plaster and matte paint; exterior walls: 15 cm pumice block with 5 cm exterior insulation cladding and silicone-based teflon paint. Stairs and entry corridors: 3 cm step, 2 cm flooring in marble or travertine. Roof: first-class tile with Izocam thermal insulation; sound insulation via special panels. Water, heating and electrical installations are complete. Garden and landscaping are integrated with the buildings' shared areas.",
        ru: "Девятиблочный комплекс на 102 квартиры (блоки A-B-C-D-E-F-G-H-I). 2000 м до центра, всего 200 м до нового стадиона Sakarya, 300 м до планируемого парка на реке Sakarya. Sakarya Adapazari, рядом со стадионом Gunesler. 140 м² 3+1, 145 м² 3+1, 105 м² 2+1. Просторные 3+1; угловые квартиры с 2 или 3 видами, 2 балконами, ванной при спальне и постирочной; встроенная кухонная техника; кладовая 3 м² внутри квартиры; одно закреплённое открытое парковочное место. Окна: ПВХ с сертификатом TSE; стеклопакет 4+16+4. Кухонные фасады из акрила или МДФ с мембраной; столешницы из гранита с хромированной мойкой. Межкомнатные двери: композитные «под дерево» или МДФ VARIO с ПВХ-покрытием; входные двери стальные. Внутренние стены: 10 см пемзобетон, штукатурка, краска; наружные: 15 см пемзобетон с 5 см наружным утеплителем и силиконово-тефлоновой краской. Лестницы и входные холлы: ступень 3 см, пол 2 см — мрамор или травертин. Крыша: черепица первого сорта и теплоизоляция Izocam; звукоизоляция спец. плитами. Водо-, тепло- и электроснабжение готовы. Сад и благоустройство интегрированы с общими зонами зданий.",
        ar: "مشروع من تسعة بلوكات (A-B-C-D-E-F-G-H-I) ويضم 102 شقة. 2000 m إلى مركز المدينة، و200 m فقط إلى ملعب Sakarya الجديد، و300 m إلى المنتزه المخطط له على نهر Sakarya. في Sakarya Adapazari، قرب ملعب Gunesler. 140 m² من 3+1، 145 m² من 3+1، و105 m² من 2+1. شقق 3+1 رحبة؛ وحدات بواجهتين أو ثلاث وشرفتين، حمام رئيسي، وغرفة غسيل؛ مطبخ بأجهزة مدمجة؛ مخزن خاص 3 m² داخل الشقة؛ موقف خارجي واحد مخصص. النوافذ: PVC بشهادة TSE؛ زجاج عازل 4+16+4. خزائن المطبخ أكريليك أو MDF بغطاء مغلف؛ كاونتر غرانيت مع حوض كروم. الأبواب الداخلية: مظهر خشبي مركّب أو أبواب VARIO من MDF بكسوة PVC؛ الأبواب الخارجية فولاذية. الجدران الداخلية: طابوق بومس 10 cm مع جص ودهان بلاستيكي؛ الجدران الخارجية: طابوق بومس 15 cm مع كسوة عازلة 5 cm ودهان تيفلون سيليكوني. السلالم وأروقة الدخول: درجة 3 cm وأرضية 2 cm من المرمر أو التيراڤيرتين. السطح: قرميد درجة أولى وعزل Izocam؛ عزل صوتي بألواح خاصة. تأسيسات الماء والتدفئة والكهرباء كاملة. الحدائق والتنسيق مدمجة بالمناطق المشتركة للمباني.",
        de: "Anlage mit neun Blöcken (A-B-C-D-E-F-G-H-I) und 102 Wohnungen. 2.000 m zum Stadtzentrum, nur 200 m zum neuen Sakarya-Stadion, 300 m zum geplanten Park am Sakarya-Fluss. In Sakarya Adapazari, in der Nähe des Gunesler-Stadions. 140 m² 3+1, 145 m² 3+1, 105 m² 2+1. Großzügige 3+1; 2- oder 3-seitige Einheiten mit 2 Balkonen, En-suite-Bad und Hauswirtschaftsraum; Einbauküche; 3 m² wohnungseigener Lagerraum; ein zugewiesener Außenstellplatz. Fenster: TSE-zertifiziertes PVC; Verglasung 4+16+4 Wärmeschutz. Küchenfronten in Acryl oder MDF mit Membran-Beschichtung; Granit-Arbeitsplatten mit Chromspüle. Innentüren: Holzoptik-Verbundtüren oder VARIO-MDF mit PVC-Beschichtung; Wohnungseingangstüren aus Stahl. Innenwände: 10 cm Bims-Hohlstein mit Putz und Dispersionsfarbe; Außenwände: 15 cm Bims-Hohlstein mit 5 cm Außendämmung und Silikon-Teflon-Anstrich. Treppen und Eingangshallen: Stufen 3 cm, Bodenbelag 2 cm Marmor oder Travertin. Dach: Ziegel erster Klasse und Izocam-Dämmung; Schallschutz durch Sonderplatten. Wasser-, Heizungs- und Elektroinstallation vollständig. Garten und Außenanlagen sind mit den Gemeinschaftsflächen verbunden."

// ═══ MULTILANG STORAGE HELPERS ═══
// Aktif dil getter (I18N henuz boot etmediyse 'tr' fallback)
function curLang(){ return (window.I18N && window.I18N.current) || 'tr'; }
// Bir alani aktif dilde dondur. Alan ya {tr,en,...} obje ya basit string olabilir (legacy).
// Eger aktif dil bos ise TR'ye, o da bossa ilk dolu degere fallback.
function getMl(field){
  if (field == null) return '';
  if (typeof field === 'string') return field; // legacy string
  if (typeof field !== 'object') return String(field);
  const lang = curLang();
  // 1. aktif dil
  let v = field[lang];
  if (typeof v === 'string' && v.trim() !== '') return v;
  if (Array.isArray(v) && v.length > 0) return v;
  // 2. TR fallback
  if (lang !== 'tr'){
    v = field.tr;
    if (typeof v === 'string' && v.trim() !== '') return v;
    if (Array.isArray(v) && v.length > 0) return v;
  }
  // 3. ilk dolu deger
  for (const k of SUPPORTED_LANGS){
    const val = field[k];
    if (typeof val === 'string' && val.trim() !== '') return val;
    if (Array.isArray(val) && val.length > 0) return val;
  }
  // 4. bos
  return Array.isArray(field.tr) ? [] : '';
}
// Bir multilang field'in herhangi bir dilde dolu olup olmadigini kontrol et
function hasAnyMl(field){
  if (field == null) return false;
  if (typeof field === 'string') return field.trim() !== '';
  if (typeof field !== 'object') return false;
  for (const k of SUPPORTED_LANGS){
    const v = field[k];
    if (typeof v === 'string' && v.trim() !== '') return true;
    if (Array.isArray(v) && v.length > 0) return true;
  }
  return false;
}
// Ml objesi degilse (string ise) sar
function toMl(val){
  if (val == null) return emptyMl();
  if (typeof val === 'string') return { tr: val, en: '', ru: '', ar: '', de: '' };
  if (typeof val === 'object'){
    return {
      tr: typeof val.tr === 'string' ? val.tr : '',
      en: typeof val.en === 'string' ? val.en : '',
      ru: typeof val.ru === 'string' ? val.ru : '',
      ar: typeof val.ar === 'string' ? val.ar : '',
      de: typeof val.de === 'string' ? val.de : ''
    };
  }
  return emptyMl();
}
// Array (tags/feats/houseTypes/types[*].n) icin: { tr:[...], en:[...], ... } veya legacy [...]
function toMlArr(val){
  if (Array.isArray(val)){
    return { tr: val.slice(), en: [], ru: [], ar: [], de: [] };
  }
  if (val && typeof val === 'object'){
    return {
      tr: Array.isArray(val.tr) ? val.tr.slice() : [],
      en: Array.isArray(val.en) ? val.en.slice() : [],
      ru: Array.isArray(val.ru) ? val.ru.slice() : [],
      ar: Array.isArray(val.ar) ? val.ar.slice() : [],
      de: Array.isArray(val.de) ? val.de.slice() : []
    };
  }
  return emptyMlArr();
}

// ═══ MIGRATION: schema v1 (string-based) -> v2 (multilang) ═══
const SafakariMigrate = {
  upgradeProject(p){
    if (!p || typeof p !== 'object') return p;
    p.name      = toMl(p.name);
    p.location  = toMl(p.location);
    p.timeline  = toMl(p.timeline);
    p.desc      = toMl(p.desc);
    p.tags      = toMlArr(p.tags);
    p.feats     = toMlArr(p.feats);
    p.houseTypes= toMlArr(p.houseTypes);
    // types: dizide her elemanin n alani multilang, s ve p tek dilli (metrik / fiyat label)
    if (Array.isArray(p.types)){
      p.types = p.types.map(t => {
        const r = (t && typeof t === 'object') ? t : {};
        return {
          n: toMl(r.n),
          s: typeof r.s === 'string' ? r.s : (r.s != null ? String(r.s) : ''),
          p: typeof r.p === 'string' ? r.p : (r.p != null ? String(r.p) : '')
        };
      });
    } else {
      p.types = [];
    }
    return p;
  },
  upgradeCompany(c){
    if (!c) return c;
    c.name    = toMl(c.name);
    c.slogan  = toMl(c.slogan);
    c.address = toMl(c.address);
    // tek dilli alanlar - eger yoksa bos string
    ['phone1','phone2','email','instagram','facebook','whatsapp'].forEach(k=>{
      if (typeof c[k] !== 'string') c[k] = c[k] != null ? String(c[k]) : '';
    });
    if (typeof c.founded !== 'number') c.founded = parseInt(c.founded,10) || 0;
    return c;
  },
  upgradeAbout(a){
    if (!a) return a;
    a.title       = toMl(a.title);
    a.subtitle    = toMl(a.subtitle);
    a.description = toMl(a.description);
    a.mission     = toMl(a.mission);
    a.vision      = toMl(a.vision);
    if (Array.isArray(a.values)){
      a.values = a.values.map(v => ({
        icon: (v && v.icon) || '🏗️',
        title: toMl(v && v.title),
        desc: toMl(v && v.desc)
      }));
    }
    if (Array.isArray(a.stats)){
      a.stats = a.stats.map(s => ({
        num: toMl(s && s.num),
        label: toMl(s && s.label)
      }));
    }
    return a;
  },
  upgradeAll(D){
    if (!D || typeof D !== 'object') return D;
    if (!D.schema || D.schema < 2){
      D.schema = 2;
      D.company = D.company || {};
      D.about   = D.about   || {};
      this.upgradeCompany(D.company);
      this.upgradeAbout(D.about);
      if (Array.isArray(D.projects)){
        D.projects.forEach(p => this.upgradeProject(p));
      }
    } else {
      // v2 ise bile saglamlik icin alanlari ml-zorla (tarayici cache'i bozuksa)
      if (D.company) this.upgradeCompany(D.company);
      if (D.about)   this.upgradeAbout(D.about);
      if (Array.isArray(D.projects)) D.projects.forEach(p => this.upgradeProject(p));
    }
    return D;
  }
};
// Boot anaminda calistir (schema garantisi)
SafakariMigrate.upgradeAll(D);

// Kisa erisim: t('key','default'); guvenli — I18N henuz boot etmediyse default doner
function t(key, def){ return (window.I18N && window.I18N.t) ? window.I18N.t(key, def) : (def != null ? def : key); }
// Builtin sayfa basligi cevirisi (about, contact, medya, kvkk vs.)
function pageTitle(p){
  // Builtin pages
  if (p.id === 'about')   return t('pages.about_title',   p.title);
  if (p.id === 'contact') return t('pages.contact_title', p.title);
  if (p.id === 'medya')   return t('pages.medya_title',   p.title);
  if (p.id === 'kvkk')    return t('pages.kvkk_title',    p.title);
  return p.title;
}
// Project field cevirisi — D.projects multilang storage'dan cek (schema v2)
// Legacy fallback: dictionary'de projects.p<id>.<field> varsa onu kullan
function tp(project, field){
  if (!project) return '';
  const raw = project[field];
  if (raw && typeof raw === 'object'){
    // Multilang obje (yeni schema)
    return getMl(raw);
  }
  if (Array.isArray(raw)){
    // Legacy array (tags/feats vs)
    return raw;
  }
  // String/legacy: i18n dictionary fallback dene
  if (window.I18N && window.I18N.tProject){
    const v = window.I18N.tProject(project.id, field);
    if (v != null) return v;
  }
  return raw != null ? raw : '';
}
// Tek bir multilang field icin aktif dil deger getter (D.about.title vs.)
function tf(field){ return getMl(field); }
// Status / price ceviri (TR sabit string'lere gore mapla)
function tStatus(s){
  if (s === 'Satışta')      return t('status.satista', s);
  if (s === 'Yapımda')      return t('status.yapimda', s);
  if (s === 'Tamamlandı')   return t('status.tamamlandi', s);
  return s;
}
function tPrice(p){
  if (p === 'Satışta')        return t('price.satista', p);
  if (p === 'Teslim Edildi')  return t('price.teslim', p);

}

// Compute visible tags per card; hide overflow + append "+N" chip
function applyTagOverflow(){
  document.querySelectorAll('.plist .card').forEach(card=>{
    const wrap=card.querySelector('.card-tags');
    if(!wrap) return;
    // Reset: show all tags, remove previous +N chip
    wrap.querySelectorAll('.card-tag-more').forEach(n=>n.remove());
    const tags=Array.from(wrap.querySelectorAll('.card-tag'));
    tags.forEach(t=>{t.style.display=''});
    const containerW=wrap.clientWidth;
    if(!containerW||tags.length===0) return;
    // Measure gap (flex gap). Use approx 4px per spec.
    const gap=4;
    let used=0; let lastFitIdx=-1;
    for(let i=0;i<tags.length;i++){
      const w=tags[i].offsetWidth;
      const next=used + (i>0?gap:0) + w;
      if(next<=containerW){ used=next; lastFitIdx=i; }
      else break;
    }
    const hiddenCount=tags.length - (lastFitIdx+1);
    if(hiddenCount>0){
      // Will need room for the "+N" chip. Hide one more tag if needed.
      const chip=document.createElement('span');
      chip.className='card-tag-more';
      chip.textContent=`+${hiddenCount}`;
      wrap.appendChild(chip);
      // Measure chip width; if overflow now, hide last visible tag too
      const chipW=chip.offsetWidth;
      while(lastFitIdx>=0 && (used + gap + chipW) > containerW){
        tags[lastFitIdx].style.display='none';
        used -= tags[lastFitIdx].offsetWidth + (lastFitIdx>0?gap:0);
        lastFitIdx--;
      }
      // Finally hide the tags beyond lastFitIdx
      for(let i=lastFitIdx+1;i<tags.length;i++) tags[i].style.display='none';
      // Recompute count: total hidden may differ from initial calc
      const finalHidden = tags.length - (lastFitIdx+1);
      if(finalHidden<=0){ chip.remove(); }
      else chip.textContent = `+${finalHidden}`;
    }
  });
}
// Re-run on window resize
window.addEventListener('resize', ()=>{ requestAnimationFrame(applyTagOverflow); });

      badge = `<span style="margin-left:5px;font-size:.65rem;color:${on?'#fff':ic_color};font-weight:700">${ic}</span>`;

  }).join('');
  // Yan etiket
  const sideLabel = admEditLang === 'tr'
    ? '(Ana dil — zorunlu)'

  // Kopyala butonu (sadece TR dışı tab'da, ve allowCopyFromTr=true ise)

    : '';
  return `
    <div class="adm-lang-tabs" role="tablist" aria-label="Düzenlenen dil" style="display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:6px 10px;background:rgba(247,245,242,.85);border:1px solid rgba(232,228,223,.7);border-radius:999px;flex-wrap:wrap">

// Lang tab tiklandiginda state'i guncelle ve form'u yeniden ciz.
// Geriye uyumluluk: redrawCb function ise eski sema (mode='save'|'redraw') calisir.
// Eger object ise: { onChange: fn, onCopyFromTr: fn }
function wireLangTabs(redrawCb){
  const isFn = typeof redrawCb === 'function';
  const obj = (redrawCb && typeof redrawCb === 'object') ? redrawCb : null;
  document.querySelectorAll('.adm-lang-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.getAttribute('data-lang');
      if (!lang || lang === admEditLang) return;
      // Mevcut input degerlerini state'e yaz (callback)
      if (isFn) redrawCb('save');
      else if (obj && typeof obj.onChange === 'function') obj.onChange('save');
      admEditLang = lang;
      // P2-3: aktif tab'i sessionStorage'a yaz
      try { sessionStorage.setItem('safakari_admin_active_lang', lang); } catch(_){}
      if (isFn) redrawCb('redraw');
      else if (obj && typeof obj.onChange === 'function') obj.onChange('redraw');
    });
  });
  // P1-1: Kopyala butonu wire
  document.querySelectorAll('.adm-copy-from-tr').forEach(btn => {
    btn.addEventListener('click', () => {
      if (admEditLang === 'tr') return;
      let copied = 0;
      if (isFn) {
        // Eski sema: redrawCb('copyFromTr') desteklenmiyor; sadece form-level copy fn varsa
        // hicbir sey yapmiyoruz (form-level helper'i drawer kendisi cagirir)
      } else if (obj && typeof obj.onCopyFromTr === 'function'){
        copied = obj.onCopyFromTr() || 0;
      }
      if (typeof toast === 'function'){
        if (copied > 0) toast(`${copied} alan TR'den ${admEditLang.toUpperCase()}'e kopyalandı`);
        else toast('Kopyalanacak alan bulunamadı (TR boş)');
      }
    });
  });
}

// Form'daki mevcut input degerlerini epDraft'a yaz (aktif dil icin)
function saveEpDraftFromInputs(){
  if (!epDraft) return;
  const lang = admEditLang;
  const v = (id)=> document.getElementById(id)?.value ?? '';
  // Multilang field'lar
  epDraft.name[lang] = v('ep_n').trim();
  epDraft.location[lang] = v('ep_l').trim();
  epDraft.timeline[lang] = v('ep_tl').trim();
  epDraft.desc[lang] = v('ep_d').trim();
  epDraft.tags[lang] = v('ep_tg').split(',').map(s=>s.trim()).filter(Boolean);
  epDraft.feats[lang] = v('ep_ft').split(',').map(s=>s.trim()).filter(Boolean);
  // Konut tipleri (multilang array)
  epDraft.houseTypes[lang] = Array.from(document.querySelectorAll('input[name="ep_ht"]:checked')).map(el=>el.value);
  // Tip satirlari (n: multilang)
  const tipRows = Array.from(document.querySelectorAll('#ep_types .ar3'));
  // tipRows mevcut types uzunlugundan farkli olabilir (kullanici eklemis/silmis)
  const newTypes = [];
  tipRows.forEach((r, idx) => {
    const nVal = r.querySelector('.tn')?.value.trim() || '';
    const sVal = r.querySelector('.ts')?.value.trim() || '';
    const pVal = r.querySelector('.tp')?.value.trim() || '';
    if (!nVal && !sVal && !pVal) return; // bos satir
    // Eger eski tip varsa, onun multilang'ini koru, sadece bu dilin n'ini guncelle
    const old = epDraft.types[idx];
    const nMl = old && old.n ? toMl(old.n) : emptyMl();
    nMl[lang] = nVal;
    newTypes.push({ n: nMl, s: sVal, p: pVal });
  });
  epDraft.types = newTypes;
  // Tek dilli
  epDraft.category = v('ep_c') || 'satilik';
  epDraft.emoji = v('ep_e') || '🏢';
  epDraft.units  = parseInt(v('ep_u'),10) || 0;
  epDraft.blocks = parseInt(v('ep_b'),10) || 1;
  epDraft.floors = parseInt(v('ep_f'),10) || 5;
  epDraft.lat = parseFloat(v('ep_lat')); if(!Number.isFinite(epDraft.lat)) epDraft.lat = 40.78;
  epDraft.lng = parseFloat(v('ep_lng')); if(!Number.isFinite(epDraft.lng)) epDraft.lng = 30.40;
  epDraft.youtubeId = v('ep_yt').trim();
  epDraft.photos = epPhotos.slice(0,5);
}

// ═══ ADMIN FORM: MINI-MAP LOCATION PICKER (madde 1) ═══
function initEpMiniMap(lat, lng){
  const host=document.getElementById('ep_mini_map');
  if(!host||!window.L) return;
  // Clean up previous instance if any
  if(epMiniMap){ try{ epMiniMap.remove(); }catch(_){} epMiniMap=null; epMiniMarker=null; }
  // Defaults: Sakarya merkez
  const startLat = Number.isFinite(lat)?lat:40.78;
  const startLng = Number.isFinite(lng)?lng:30.40;
  epMiniMap = L.map(host,{zoomControl:true,attributionControl:false}).setView([startLat,startLng],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO'}).addTo(epMiniMap);
  epMiniMarker = L.marker([startLat,startLng],{draggable:true}).addTo(epMiniMap);
  // Click to set location
  epMiniMap.on('click', e=>{
    const {lat:la, lng:ln}=e.latlng;
    epMiniMarker.setLatLng([la,ln]);
    setEpLatLngInputs(la,ln);
  });
  // Drag marker to fine-tune
  epMiniMarker.on('dragend', ()=>{
    const ll=epMiniMarker.getLatLng();
    setEpLatLngInputs(ll.lat, ll.lng);
  });
  // Two-way sync: input changes -> fly map
  const latEl=document.getElementById('ep_lat'), lngEl=document.getElementById('ep_lng');
  const onLatLngInput=()=>{
    const la=parseFloat(latEl.value), ln=parseFloat(lngEl.value);
    if(Number.isFinite(la)&&Number.isFinite(ln)&&Math.abs(la)<=90&&Math.abs(ln)<=180){
      epMiniMarker.setLatLng([la,ln]);
      epMiniMap.flyTo([la,ln], Math.max(epMiniMap.getZoom(),13), {duration:.6});
    }
  };
  latEl.addEventListener('change', onLatLngInput);
  lngEl.addEventListener('change', onLatLngInput);
  // Ensure correct sizing after insertion
  setTimeout(()=>{ try{ epMiniMap.invalidateSize(); }catch(_){} }, 80);
  setTimeout(()=>{ try{ epMiniMap.invalidateSize(); }catch(_){} }, 300);
}
function setEpLatLngInputs(lat, lng){
  const latEl=document.getElementById('ep_lat'), lngEl=document.getElementById('ep_lng');
  if(latEl) latEl.value=(+lat).toFixed(5);
  if(lngEl) lngEl.value=(+lng).toFixed(5);
}

// ═══ ADMIN FORM: PHOTO UPLOAD (madde 2) ═══
function wireEpPhotoInput(){
  const inp=document.getElementById('ep_photos_input');
  if(!inp) return;
  inp.addEventListener('change', async (ev)=>{
    const files=Array.from(ev.target.files||[]);
    if(!files.length) return;
    for(const f of files){
      if(epPhotos.length>=5){ toast('En fazla 5 fotoğraf eklenebilir'); break; }
      if(!/^image\//.test(f.type)){ toast('Sadece görsel dosyalar yüklenebilir'); continue; }
      try {
        const dataUrl = await resizePhotoToDataURL(f, 800, 0.8);
        epPhotos.push(dataUrl);
      } catch(err){
        toast('Fotoğraf yüklenemedi');
        console.warn('photo resize failed', err);
      }
    }
    renderEpPhotos();
    inp.value=''; // allow re-uploading same file
  });
}
function resizePhotoToDataURL(file, maxW, quality){
  return new Promise((resolve, reject)=>{
    const r=new FileReader();
    r.onerror=()=>reject(new Error('read fail'));
    r.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('decode fail'));
      img.onload=()=>{
        try {
          const ratio = img.width>maxW ? (maxW/img.width) : 1;
          const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
          const c=document.createElement('canvas');
          c.width=w; c.height=h;
          const ctx=c.getContext('2d');
          ctx.drawImage(img,0,0,w,h);
          resolve(c.toDataURL('image/jpeg', quality));
        } catch(e){ reject(e); }
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

// PAGE BUILDER v1 — Editor.js tabanli sayfa editoru
// Wix-benzeri inline, template'li, auto-save'li
// ═══════════════════════════════════════════════════

// ── Utility: HTML escape (inline metin icin) ──
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── localStorage persistence ──
const PAGES_KEY = 'safakari_pages_v1';
const ABOUT_KEY = 'safakari_about_v1';
const COMPANY_KEY = 'safakari_company_v1';
const SITE_KEY = 'safakari_site_v1';

// ── Multilang completeness helpers (P1-3 / P1-4) ──
// Bir multilang field'in TR'si dolu ama belirli bir dilde bos mu?
function isLangEmpty(field, lang){
  if (field == null) return true;
  if (typeof field === 'string') return lang === 'tr' ? !field.trim() : true;
  if (typeof field !== 'object') return true;
  const v = field[lang];
  if (typeof v === 'string') return !v.trim();
  if (Array.isArray(v)) return v.length === 0;
  return true;
}
// Verilen scope (D.about veya D.company) icindeki belirli multilang field listesi icin
// hangi dillerde icerik bos? Sadece TR dolu olan field'larda kontrol eder
// (TR de bossa o field skipple — eksik degil "girilmemis").
function countMissingLangs(scope, fieldNames){
  const missing = new Set();
  const langs = ['en','ru','ar','de'];
  fieldNames.forEach(fn => {
    const f = scope[fn];
    if (!f || isLangEmpty(f, 'tr')) return; // TR bos -> skip (kullanici hic doldurmamis)
    langs.forEach(lg => {
      if (isLangEmpty(f, lg)) missing.add(lg);
    });
  });
  return Array.from(missing);
}
// Form scope icin per-dil doluluk haritasi: form acildiginda lang tab'larin yanina
// rozet seridi cizmek icin. {tr:bool, en:bool, ru:bool, ar:bool, de:bool}
function getCompletenessMap(scope, fieldNames){
  const map = { tr:false, en:false, ru:false, ar:false, de:false };
  ['tr','en','ru','ar','de'].forEach(lg => {
    map[lg] = fieldNames.some(fn => !isLangEmpty(scope[fn], lg));
  });
  return map;
}
// "TR'den kopyala" helper (P1-1 / P1-2): scope icindeki tum multilang field'lar
// icin field[activeLang] = field.tr (string clone) veya field[activeLang] = [...field.tr]
// (array clone). activeLang TR ise no-op.
function copyAllFromTr(scope, fieldNames, targetLang){
  if (!scope || !targetLang || targetLang === 'tr') return 0;
  let copied = 0;
  fieldNames.forEach(fn => {
    const f = scope[fn];
    if (!f || typeof f !== 'object') return;
    const trVal = f.tr;
    if (typeof trVal === 'string'){
      if (trVal.trim()){ f[targetLang] = trVal; copied++; }
    } else if (Array.isArray(trVal)){
      if (trVal.length){ f[targetLang] = trVal.slice(); copied++; }
    }
  });
  return copied;
}

function persistAbout(){
  try {
    localStorage.setItem(ABOUT_KEY, JSON.stringify({about: D.about, savedAt: Date.now()}));
  } catch(e){
    if(e && (e.name==='QuotaExceededError' || e.code===22 || /quota/i.test(e.message||''))){
      toast('⚠️ Depolama dolu — yedeği indir ve eski sayfalari sil');
    }
  }
}
function persistCompany(){
  // Hem company_v1 hem site_v1 anahtarlarina yaz - boot'ta her ikisi de okunur
  // (saveContact contact subset'i, saveSite site subset'i bekleyebilir; tek kaynaktan
  // yaziliyor: D.company)
  try {
    const payload = JSON.stringify({company: D.company, savedAt: Date.now()});
    localStorage.setItem(COMPANY_KEY, payload);
    localStorage.setItem(SITE_KEY, payload);
  } catch(e){

function loadAboutCompany(){
  // About: localStorage > seed
  try {
    const raw = localStorage.getItem(ABOUT_KEY);
    if (raw){
      const data = JSON.parse(raw);
      if (data && data.about && typeof data.about === 'object'){
        // Schema garantisi
        D.about = data.about;
        if (typeof SafakariMigrate !== 'undefined') SafakariMigrate.upgradeAbout(D.about);
      }
    }
  } catch(e){ /* ignore parse errors */ }
  // Company: company_v1 ve site_v1 - en yeni savedAt kazansin
  try {
    let chosen = null, chosenTs = -1;
    [COMPANY_KEY, SITE_KEY].forEach(k => {
      const raw = localStorage.getItem(k);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (data && data.company && typeof data.company === 'object'){
          const ts = typeof data.savedAt === 'number' ? data.savedAt : 0;
          if (ts > chosenTs){ chosen = data.company; chosenTs = ts; }
        }
      } catch(_){ /* ignore individual parse */ }
    });
    if (chosen){
      D.company = chosen;
      if (typeof SafakariMigrate !== 'undefined') SafakariMigrate.upgradeCompany(D.company);
    }
  } catch(e){ /* ignore */ }
}
function persistPages(){
  try {
    localStorage.setItem(PAGES_KEY, JSON.stringify({pages: D.pages, savedAt: Date.now()}));
  } catch(e){
    if(e && (e.name==='QuotaExceededError' || e.code===22 || /quota/i.test(e.message||''))){
      toast('⚠️ Depolama dolu — Yedek indir ve eski sayfalari sil');
    }
  }
}
function loadPages(){
  try {
    const raw = localStorage.getItem(PAGES_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && Array.isArray(data.pages) && data.pages.length){
      // Merge: localStorage has priority over defaults, but ensure builtin pages still exist
      const saved = data.pages;
      const savedIds = new Set(saved.map(p=>p.id));
      // Keep builtin defaults that are missing from storage
      D.pages.filter(p=>p.type==='builtin' && !savedIds.has(p.id)).forEach(bp=>saved.push(bp));
      D.pages = saved;
    }
  } catch(e){ /* ignore parse/storage errors, keep defaults */ }
}

// ── Runtime migration: legacy page (sections/content) → editorData blocks ──
function migratePageToBlocks(pg){
  if(!pg) return pg;
  if(pg.editorData && Array.isArray(pg.editorData.blocks) && pg.editorData.blocks.length){
    return pg; // already migrated
  }
  const blocks = [];
  if(pg.content && String(pg.content).trim()){
    blocks.push({type:'paragraph', data:{text: String(pg.content)}});
  }
  if(Array.isArray(pg.sections)){
    pg.sections.forEach(s=>{
      if(s && s.title) blocks.push({type:'header', data:{text: String(s.title), level:2}});
      if(s && s.text)  blocks.push({type:'paragraph', data:{text: String(s.text)}});
    });
  }
  if(!blocks.length){
    blocks.push({type:'paragraph', data:{text:''}});
  }
  pg.editorData = {time: Date.now(), blocks, version:'2.30.7'};
  return pg;
}

// ── DOMPurify sanitizer (her save oncesi) ──
function sanitizeBlocks(editorJson){
  if(!editorJson || !Array.isArray(editorJson.blocks)) return editorJson;
  editorJson.blocks.forEach(b=>{
    if(!b || !b.data) return;
    if(b.type==='header' && typeof b.data.text==='string'){
      b.data.text = DOMPurify.sanitize(b.data.text, {ALLOWED_TAGS:[], ALLOWED_ATTR:[]});
    } else if(b.type==='paragraph' && typeof b.data.text==='string'){
      b.data.text = DOMPurify.sanitize(b.data.text, {
        ALLOWED_TAGS:['b','i','u','a','br','strong','em','mark','code'],
        ALLOWED_ATTR:['href','target','rel']
      });
    } else if(b.type==='list' && Array.isArray(b.data.items)){
      b.data.items = b.data.items.map(it => typeof it==='string'
        ? DOMPurify.sanitize(it, {ALLOWED_TAGS:['b','i','u','a','br','strong','em'], ALLOWED_ATTR:['href','target','rel']})
        : it);
    } else if(b.type==='image' && b.data.caption){
      b.data.caption = DOMPurify.sanitize(String(b.data.caption), {ALLOWED_TAGS:[]});
    } else if(b.type==='button' && b.data){
      if(typeof b.data.label==='string') b.data.label = DOMPurify.sanitize(b.data.label, {ALLOWED_TAGS:[]});
      if(typeof b.data.url==='string')   b.data.url   = b.data.url.trim().slice(0,500);
    } else if(b.type==='gallery' && b.data){
      if(!['2','3','4'].includes(String(b.data.layout))) b.data.layout = '3';
      if(!Array.isArray(b.data.images)) b.data.images = [];
      b.data.images = b.data.images.slice(0,4).map(i => {
        if(!i || typeof i!=='object') return {url:'', caption:''};
        const rawUrl = typeof i.url==='string' ? i.url.trim() : '';
        const url = /^(https?:\/\/|data:image\/|\/)/i.test(rawUrl) ? rawUrl.slice(0, 5_000_000) : '';
        const caption = typeof i.caption==='string'
          ? DOMPurify.sanitize(i.caption, {ALLOWED_TAGS:[]}).slice(0,160)
          : '';
        return {url, caption};
      });
    }
  });
  return editorJson;
}

// ── Public render: editorData → HTML ──
function renderPageBlocks(pg){
  const migrated = migratePageToBlocks(pg);
  // i18n: pg.title icin builtin sayfalarda ceviri kullan
  const title = pageTitle(pg);
  let html = `<div class="gpage"><h1>${escapeHtml(pg.icon||'📄')} ${escapeHtml(title||'')}</h1><div class="divider"></div>`;
  (migrated.editorData.blocks||[]).forEach(b => { html += renderBlock(b); });
  html += `</div>`;
  return html;
}
function renderBlock(b){
  if(!b || !b.type) return '';
  const d = b.data || {};
  switch(b.type){
    case 'header': {
      const lvl = Math.min(Math.max(parseInt(d.level,10)||2, 1), 3);
      const safe = DOMPurify.sanitize(d.text||'', {ALLOWED_TAGS:[], ALLOWED_ATTR:[]});
      return `<h${lvl} class="pb-h${lvl}">${safe}</h${lvl}>`;
    }
    case 'paragraph': {
      const safe = DOMPurify.sanitize(d.text||'', {
        ALLOWED_TAGS:['b','i','u','a','br','strong','em','mark','code'],
        ALLOWED_ATTR:['href','target','rel']
      });
      return `<p class="pb-p">${safe}</p>`;
    }
    case 'list': {
      const tag = d.style === 'ordered' ? 'ol' : 'ul';
      const items = (d.items||[]).map(it => {
        const s = typeof it==='string' ? it : (it && it.content ? it.content : '');
        return `<li>${DOMPurify.sanitize(s, {ALLOWED_TAGS:['b','i','u','a','br','strong','em'], ALLOWED_ATTR:['href','target','rel']})}</li>`;
      }).join('');
      return `<${tag} class="pb-list">${items}</${tag}>`;
    }
    case 'image': {
      const url = d.file && d.file.url ? String(d.file.url) : '';
      if(!url) return '';
      const safeUrl = /^(https?:|data:image\/|\/)/i.test(url) ? url : '';
      if(!safeUrl) return '';
      const cap = d.caption ? DOMPurify.sanitize(String(d.caption), {ALLOWED_TAGS:[]}) : '';
      const capHtml = cap ? `<figcaption>${cap}</figcaption>` : '';
      return `<figure class="pb-img"><img src="${safeUrl}" alt="${cap}" loading="lazy">${capHtml}</figure>`;
    }
    case 'gallery': {
      const layout = ['2','3','4'].includes(String(d.layout)) ? String(d.layout) : '3';
      const imgs = (Array.isArray(d.images) ? d.images : []).map(i => {
        if(!i || !i.url) return '';
        const safeUrl = /^(https?:|data:image\/|\/)/i.test(String(i.url)) ? String(i.url) : '';
        if(!safeUrl) return '';
        const cap = i.caption ? DOMPurify.sanitize(String(i.caption), {ALLOWED_TAGS:[]}) : '';
        const capHtml = cap ? `<figcaption>${cap}</figcaption>` : '';
        return `<figure class="pb-gal-item"><img src="${safeUrl}" alt="${cap}" loading="lazy">${capHtml}</figure>`;
      }).filter(Boolean).join('');
      if(!imgs) return '';
      return `<div class="pb-gallery pb-gal-${layout}">${imgs}</div>`;
    }
    case 'button': {
      const label = DOMPurify.sanitize(d.label||'Detaylı Bilgi', {ALLOWED_TAGS:[]}) || 'Detaylı Bilgi';
      const rawHref = (d.url||'').trim();
      const safeHref = /^(https?:|mailto:|tel:|#|\/)/i.test(rawHref) ? rawHref : '#';
      const external = /^https?:/i.test(safeHref);
      const attrs = external ? 'target="_blank" rel="noopener noreferrer"' : '';
      return `<a class="pb-btn tb pri" href="${escapeHtml(safeHref)}" ${attrs}>${label}</a>`;
    }
    case 'delimiter': return `<hr class="pb-hr">`;
    default: return '';
  }
}

// ── Admin: Slug helper ──
function slugifyTitle(t){
  const trMap = {'ş':'s','ğ':'g','ü':'u','ı':'i','İ':'i','ö':'o','ç':'c','Ş':'s','Ğ':'g','Ü':'u','Ö':'o','Ç':'c'};
  let s = String(t||'').toLowerCase();
  s = s.replace(/[şğüıİöçŞĞÜÖÇ]/g, ch => trMap[ch]||ch);
  s = s.replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  return s || ('sayfa-'+Date.now());
}
function uniquePageId(base){
  const existing = new Set(D.pages.map(p=>p.id));
  if(!existing.has(base)) return base;
  let i = 2;
  while(existing.has(base+'-'+i)) i++;
  return base+'-'+i;
}

// ── Admin: Create page from template ──
function createPageFromTemplate(tplKey){
  const t = PAGE_TEMPLATES[tplKey];
  if(!t){ toast('Sablon bulunamadi'); return; }
  const title = t.defaultTitle;
  const id = uniquePageId(slugifyTitle(title));
  const pg = {
    id,
    title,
    type:'custom',
    visible:false, // taslak
    icon:t.icon,
    editorData: JSON.parse(JSON.stringify(t.data)) // deep clone
  };
  pg.editorData.time = Date.now();
  D.pages.push(pg);
  persistPages();
  openPageEditor(id);
  toast('Taslak olusturuldu, duzenlemeye basla');
}

function deletePage(id){
  if(!confirm('Bu sayfayi silmek istediginize emin misiniz? Bu islem geri alinamaz.')) return;
  D.pages = D.pages.filter(p=>p.id!==id);
  const el = document.getElementById('pg-'+id);
  if(el) el.remove();
  persistPages();
  buildNav();
  admTab('pages', document.querySelectorAll('.adm-ni')[4]);
  toast('Sayfa silindi');
}
